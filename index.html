let currentAudio=null;
function stopAudio(){try{if(currentAudio){currentAudio.pause();currentAudio.src="";currentAudio=null;}}catch(e){}if('speechSynthesis'in window)speechSynthesis.cancel();}
// Aktive Aufnahme/Spracherkennung beenden (z. B. wenn der Nutzer waehrend einer Aufnahme die Seite verlaesst) – sonst bleibt das Mikrofon an.
let activeRec=null,activeSR=null;
function stopRecording(){
  if(activeSR){try{activeSR.abort();}catch(e){}activeSR=null;}
  if(activeRec){try{if(activeRec.mr&&activeRec.mr.state!=="inactive")activeRec.mr.stop();}catch(e){}try{activeRec.stream.getTracks().forEach(t=>t.stop());}catch(e){}activeRec=null;}
}
// Spielt eine Liste von MP3-Dateinamen nacheinander ab (z. B. Gespräch mit 2 Sprechern); bei Fehler -> Browser-Stimme.
function playAudio(files,fallbackText,rate){
  stopAudio();
  if(!files||!files.length||!files[0]){speak(fallbackText,rate);return;}
  let i=0;
  const next=()=>{
    if(i>=files.length){currentAudio=null;return;}
    const a=new Audio(AUDIO_BASE+files[i]);currentAudio=a;
    a.onended=()=>{i++;next();};
    a.onerror=()=>{currentAudio=null;speak(fallbackText,rate);};
    a.play().catch(()=>{currentAudio=null;speak(fallbackText,rate);});
  };
  next();
}
function audioButton(text,label,files){
  const b=el(`<button class="btn ghost audiobtn">▶ ${label||"Abspielen"}</button>`);
  b.onclick=()=>playAudio(files,text);
  return b;
}

// Listen-and-Repeat: Spracherkennung & Abgleich – als verlaesslicher Start/Stopp-Toggle
function doRepeat(target,fb,btn,cb){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    // Kein Browser-Support (Firefox/Safari/iOS): keine Auto-Bewertung -> reine Aufnahme zum Selbstvergleich
    fb.innerHTML='<span class="muted">Automatische Aussprache-Erkennung gibt es in diesem Browser nicht (am besten Chrome). Du kannst dich stattdessen aufnehmen und selbst vergleichen.</span>';
    doRecordPlayback(fb,btn);
    return;
  }
  const startHandler=btn.onclick, startLabel=btn.textContent;
  let rec=new SR(), watchdog=null, finished=false;
  rec.lang="en-US";rec.interimResults=false;rec.maxAlternatives=1;activeSR=rec;
  function reset(){if(watchdog){clearTimeout(watchdog);watchdog=null;}if(activeSR===rec)activeSR=null;rec=null;btn.textContent=startLabel;btn.onclick=startHandler;}
  function stopListening(){if(rec){try{rec.abort();}catch(e){}}}
  function showNoSpeech(){fb.innerHTML='<span class="muted">Keine Sprache erkannt. Tippe erneut auf „● Aufnahme" und sprich den Satz – oder nimm dich auf und vergleiche selbst.</span>';}
  rec.onresult=(e)=>{
    finished=true;
    const said=e.results[0][0].transcript;
    const score=similarity(target,said);
    const cls=score>=80?"good":score>=50?"mid":"low";
    fb.innerHTML="";
    const box=el(`<div class="result ${cls}" style="margin-top:6px"></div>`);
    box.textContent=`Erkannt: „${said}" — Übereinstimmung: ${score}%`;  // textContent = injektionssicher
    fb.appendChild(box);
    cb&&cb(score);
  };
  rec.onerror=(e)=>{
    finished=true;
    if(e.error==="no-speech"){showNoSpeech();}
    else if(e.error==="aborted"){/* vom Nutzer oder Watchdog – Meldung ist ggf. schon gesetzt */}
    else if(e.error==="not-allowed"||e.error==="service-not-allowed"){fb.innerHTML='<span class="muted">Mikrofon ist nicht freigegeben. Bitte den Mikrofon-Zugriff für diese Seite erlauben.</span>';}
    else if(e.error==="audio-capture"){fb.innerHTML='<span class="muted">Kein Mikrofon gefunden.</span>';}
    else{fb.innerHTML=`<span class="muted">Spracherkennung nicht möglich (${e.error}).</span>`;}
  };
  rec.onend=()=>{reset();};   // einziger Aufraeumpunkt: feuert nach result/error/abort
  fb.innerHTML='🎙️ <b>Sprich jetzt…</b> <span class="muted">(zum Abbrechen erneut tippen)</span>';
  btn.textContent="■ Stopp";
  btn.onclick=()=>{fb.innerHTML='<span class="muted">Abgebrochen.</span>';stopListening();};  // 2. Tipp = sofortiger Abbruch
  try{
    rec.start();
    watchdog=setTimeout(()=>{if(!finished){showNoSpeech();stopListening();}},8000);  // gegen Haengen bei Stille
  }catch(err){
    fb.innerHTML='<span class="muted">Spracherkennung konnte nicht gestartet werden. Bitte erneut versuchen.</span>';
    reset();
  }
}
// Reine Audioaufnahme + Wiedergabe (Start/Stop-Toggle; erneute Aufnahme jederzeit moeglich)
function doRecordPlayback(container,btn){
  if(!micSupported()){container.innerHTML='<span class="muted">Kein Mikrofon verfügbar – bitte über HTTPS/localhost öffnen.</span>';return;}
  const startHandler=btn.onclick;          // Original-Start-Handler merken …
  const startLabel=btn.textContent;
  function restore(){btn.textContent=startLabel;btn.onclick=startHandler;}  // … und nach Stop wiederherstellen
  btn.disabled=true;                       // nur kurz, bis das Mikrofon bereit ist
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    let mr;
    try{mr=new MediaRecorder(stream);}catch(e){stream.getTracks().forEach(t=>t.stop());btn.disabled=false;restore();container.innerHTML='<span class="muted">Aufnahme wird von diesem Browser nicht unterstützt.</span>';return;}
    const chunks=[];const cleanup=()=>{stream.getTracks().forEach(t=>t.stop());if(activeRec&&activeRec.mr===mr)activeRec=null;};
    mr.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data);};
    mr.onstop=()=>{
      cleanup();restore();
      if(chunks.length){const url=URL.createObjectURL(new Blob(chunks,{type:'audio/webm'}));container.innerHTML="";container.appendChild(el(`<audio controls src="${url}" style="width:100%;margin-top:8px"></audio>`));}
      else container.innerHTML='<span class="muted">Keine Aufnahme erfasst – bitte erneut versuchen.</span>';
    };
    mr.onerror=()=>{cleanup();restore();container.innerHTML='<span class="muted">Aufnahme abgebrochen. Bitte erneut versuchen.</span>';};
    mr.start();activeRec={mr,stream};btn.disabled=false;btn.textContent="■ Stopp";
    btn.onclick=()=>{if(mr.state!=="inactive")mr.stop();};   // Stop bricht sauber ab; danach restore() → neuer Start moeglich
    container.innerHTML='<span class="muted">🎙️ Aufnahme läuft… auf „Stopp" drücken.</span>';
  }).catch(err=>{btn.disabled=false;restore();container.innerHTML=`<span class="muted">Mikrofon-Zugriff nicht möglich (${err.name}). Bitte den Mikrofon-Zugriff für diese Seite erlauben.</span>`;});
}
// einfache Wort-Übereinstimmung
function similarity(a,b){
  const norm=s=>s.toLowerCase().replace(/[^a-z\s']/g," ").split(/\s+/).filter(Boolean);
  const A=norm(a),B=new Set(norm(b));let hit=0;A.forEach(w=>{if(B.has(w))hit++;});
  return Math.round(hit/Math.max(A.length,1)*100);
}

  });
  return ()=>({
    correct: questions.reduce((n,qu,i)=>n+(sel[i]===qu.answer?1:0),0),
    items: questions.map((qu,i)=>({q:qu.q,options:qu.options,answer:qu.answer,chosen:sel[i],explain:qu.explain}))
  });
}
function examSelfRate(container,label){
  const wrap=el(`<div class="rubric"><b>${label}</b><div class="muted small">1 = sehr unsicher · 5 = sehr sicher/flüssig</div><div class="row" style="margin-top:8px"></div></div>`);
  const row=wrap.querySelector(".row"); let val=3;
  for(let n=1;n<=5;n++){const b=el(`<button class="btn ghost sm" style="min-width:42px">${n}</button>`);if(n===3)b.classList.add("accent");b.onclick=()=>{val=n;row.querySelectorAll("button").forEach(x=>x.classList.remove("accent"));b.classList.add("accent");};row.appendChild(b);}
  container.appendChild(wrap); return ()=>val;
}
function examClock(){return el(`<div class="card" style="position:sticky;top:64px;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:12px 16px"><span class="small muted">Gesamtzeit</span><span class="timer" id="examclock">${fmt(examLeft)}</span></div>`);}
function examHeader(sectionTitle,sub){
  const c=el(`<div class="card"><h2>${sectionTitle}</h2><p class="muted small">${sub}</p></div>`);
  return c;
}
function startExamTimer(){
  examLeft=90*60; // R30+L29+W23+S8 ~ 90 min
  if(examInterval)clearInterval(examInterval);
  examInterval=setInterval(()=>{examLeft--;const c=document.getElementById("examclock");if(c){c.textContent=examLeft>0?fmt(examLeft):"Zeit um";if(examLeft<=300)c.classList.add("warn");}if(examLeft<=0){clearInterval(examInterval);examInterval=null;}},1000);
}
function stopExamTimer(){if(examInterval){clearInterval(examInterval);examInterval=null;}}

function viewExam(){
  clear();
  examState.reading=examState.listening=examState.writing=examState.speaking=0;examState.rPath="";examState.lPath="";examState.review=[];
  app.appendChild(el(`<div class="card">
    <h2>🎓 Voll-Simulation <span class="pill">prüfungsnah</span></h2>
    <p class="muted small">Ein durchgehender Testdurchlauf in der echten Reihenfolge <b>Reading → Listening → Writing → Speaking</b> mit Gesamt-Timer (~90 Min.) und Gesamt-Score (0–120 / Band / CEFR).</p>
    <p class="small"><b>Adaptiv wie im echten Test:</b> In Reading und Listening bestimmt dein erster Block, ob ein <b>schwererer</b> oder <b>leichterer</b> Folgeblock kommt. Schwere Blöcke richtig zu lösen ermöglicht den höchsten Score. (Writing & Speaking sind – wie real – nicht adaptiv und werden per Selbsteinschätzung + Musterlösung bewertet.)</p>
    <div class="note">Während des Laufs gibt es <b>keine</b> Lösungen/Erklärungen – die kommen erst im Ergebnis. Referenz-Itemzahlen im echten Test: Reading 50 · Listening 47 · Writing 12 · Speaking 11. Diese Simulation nutzt eine repräsentative, kürzere Auswahl.</div>
  </div>`));
  const start=el('<button class="btn">Simulation starten ▶</button>');
  start.onclick=()=>{startExamTimer();examReading1();};
  app.appendChild(start);
  app.appendChild(backBtn());
}

// ---- READING (adaptiv) ----
function examReading1(){
  clear();app.appendChild(examClock());
  const b=EXAM.reading.routing;
  const c=examHeader("📖 Reading – "+b.label,"Lies die Passage und beantworte alle Fragen. Empfohlene Zeit für Reading gesamt: ~30 Min.");
  c.appendChild(el(`<pre style="white-space:pre-wrap;font-family:inherit;font-size:14.5px;background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:12px">${b.passage}</pre>`));
  const score=examMCQ(c,b.questions);app.appendChild(c);
  const next=el('<button class="btn accent">Weiter →</button>');
  next.onclick=()=>{const res=score(),frac=res.correct/b.questions.length;examState.review.push({title:"📖 Reading – "+b.label,items:res.items});examReading2(frac);};
  app.appendChild(next);
}
function examReading2(routF){
  clear();app.appendChild(examClock());
  const hard=routF>=0.6; examState.rPath=hard?"schwer":"leicht";
  const b=hard?EXAM.reading.hard:EXAM.reading.easy;
  app.appendChild(el(`<div class="note">Dein erster Block lief ${hard?"<b>gut</b> → es folgt ein <b>schwererer</b>":"<b>durchwachsen</b> → es folgt ein <b>leichterer</b>"} Block (Adaptivität).</div>`));
  const c=examHeader("📖 Reading – "+b.label,"Beantworte alle Fragen.");
  c.appendChild(el(`<pre style="white-space:pre-wrap;font-family:inherit;font-size:14.5px;background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:12px">${b.passage}</pre>`));
  const score=examMCQ(c,b.questions);app.appendChild(c);
  const next=el('<button class="btn accent">Reading abschließen →</button>');
  next.onclick=()=>{
    const res=score(),frac=res.correct/b.questions.length;
    examState.review.push({title:"📖 Reading – "+b.label,items:res.items});
    examState.reading = hard ? 30*(0.4*routF+0.6*frac) : 24*(0.4*routF+0.6*frac);
    examListening1();
  };
  app.appendChild(next);
}

// ---- LISTENING (adaptiv) ----
function examListening1(){
  clear();app.appendChild(examClock());
  const b=EXAM.listening.routing;
  const c=examHeader("🎧 Listening – "+b.label,"Höre den Beitrag (echte Stimme) und beantworte die Fragen. Empfohlene Zeit für Listening gesamt: ~29 Min.");
  c.appendChild(audioButton(b.script,"Anhören",[AUDIO.talkOpp]));
  const score=examMCQ(c,b.questions);app.appendChild(c);
  const next=el('<button class="btn accent">Weiter →</button>');
  next.onclick=()=>{const res=score(),frac=res.correct/b.questions.length;examState.review.push({title:"🎧 Listening – "+b.label,items:res.items});examListening2(frac);};
  app.appendChild(next);
}
function examListening2(routF){
  clear();app.appendChild(examClock());
  const hard=routF>=0.6; examState.lPath=hard?"schwer":"leicht";
  const b=hard?EXAM.listening.hard:EXAM.listening.easy;
  app.appendChild(el(`<div class="note">Listening-Folgeblock: ${hard?"<b>schwerer</b> (gute Leistung im ersten Block)":"<b>leichter</b>"} (Adaptivität).</div>`));
  const c=examHeader("🎧 Listening – "+b.label,"Höre den Beitrag und beantworte die Fragen.");
  c.appendChild(audioButton(b.script,"Anhören",[hard?AUDIO.talkComp:AUDIO.ann]));
  const score=examMCQ(c,b.questions);app.appendChild(c);
  const next=el('<button class="btn accent">Listening abschließen →</button>');
  next.onclick=()=>{
    const res=score(),frac=res.correct/b.questions.length;
    examState.review.push({title:"🎧 Listening – "+b.label,items:res.items});
    examState.listening = hard ? 30*(0.4*routF+0.6*frac) : 24*(0.4*routF+0.6*frac);
    examWriting();
  };
  app.appendChild(next);
}

// ---- WRITING (nicht adaptiv) ----
function examWriting(){
  clear();app.appendChild(examClock());
  const c=examHeader("✍️ Writing","Empfohlene Zeit: ~23 Min. Teil 1: Build a Sentence (automatisch bewertet). Teil 2: kurze E-Mail (Selbsteinschätzung).");
  // Build a Sentence
  c.appendChild(el('<h3>Teil 1 – Build a Sentence</h3>'));
  const orders=[];
  EXAM.writing.buildSentence.forEach((sentence,i)=>{
    const words=sentence.replace(/\.$/,"").split(" ");
    const box=el(`<div class="q"><div class="qt">Satz ${i+1}</div></div>`);
    const answer=el('<div class="answerbox"></div>');const pool=el('<div class="row"></div>');const order=[];orders[i]={order,words};
    shuffle(words).forEach(wd=>{const chip=el(`<span class="chip">${wd}</span>`);chip.onclick=()=>{order.push(wd);chip.classList.add("used");const a=el(`<span class="chip">${wd}</span>`);a.onclick=()=>{const idx=order.lastIndexOf(wd);if(idx>-1)order.splice(idx,1);a.remove();chip.classList.remove("used");};answer.appendChild(a);};pool.appendChild(chip);});
    box.appendChild(answer);box.appendChild(pool);c.appendChild(box);
  });
  // Email
  c.appendChild(el('<h3>Teil 2 – Write an Email</h3>'));
  c.appendChild(el(`<div class="q"><div class="qt">${EXAM.writing.email.q}</div></div>`));
  const ta=el('<textarea placeholder="Hier schreiben…"></textarea>');c.appendChild(ta);
  const rateGetter=examSelfRate(c,"Selbsteinschätzung deiner E-Mail (Aufgabe erfüllt, Struktur, Ton, Sprache):");
  app.appendChild(c);
  const next=el('<button class="btn accent">Writing abschließen →</button>');
  next.onclick=()=>{
    let ok=0;orders.forEach(o=>{if(o.order.join(" ")===o.words.join(" "))ok++;});
    const buildFrac=ok/orders.length;
    const emailSelf=rateGetter()/5;
    examState.writing = 30*(0.5*buildFrac + 0.5*emailSelf);
    examSpeaking();
  };
  app.appendChild(next);
}

// ---- SPEAKING (nicht adaptiv) ----
function examSpeaking(){
  clear();app.appendChild(examClock());
  const c=examHeader("🎙️ Speaking","Empfohlene Zeit: ~8 Min. Sprich laut, nimm dich auf und bewerte dich realistisch selbst.");
  if(secureHint())c.appendChild(el(secureHint()));
  const rates=[];
  c.appendChild(el('<h3>Teil 1 – Listen and Repeat</h3>'));
  EXAM.speaking.listenRepeat.forEach((sent,i)=>{
    const box=el(`<div class="q"><div class="qt">Satz ${i+1}: anhören & exakt nachsprechen</div></div>`);
    const play=el('<button class="btn ghost sm">▶ hören</button>');play.onclick=()=>playAudio([[AUDIO.lr2,AUDIO.lr6,AUDIO.lr7][i]],sent);
    const rec=el('<button class="btn sm" style="margin-left:8px">● Aufnahme</button>');const player=el('<div style="margin-top:8px"></div>');
    rec.onclick=()=>doRecordPlayback(player,rec);
    box.appendChild(play);box.appendChild(rec);box.appendChild(player);
    rates.push(examSelfRateInline(box,"Wie genau war deine Wiederholung?"));
    c.appendChild(box);
  });
  c.appendChild(el('<h3>Teil 2 – Take an Interview</h3>'));
  EXAM.speaking.interview.forEach((pr,i)=>{
    const box=el(`<div class="q"><div class="qt">${i+1}. ${pr.q}</div></div>`);
    box.appendChild(audioButton(pr.q,"Frage hören"));
    const rec=el('<button class="btn sm" style="margin-left:8px">● Antwort aufnehmen</button>');const player=el('<div style="margin-top:8px"></div>');
    rec.onclick=()=>doRecordPlayback(player,rec);
    box.appendChild(rec);box.appendChild(player);
    rates.push(examSelfRateInline(box,"Wie flüssig & vollständig war deine Antwort?"));
    const mb=el('<button class="btn ghost sm" style="margin-top:8px">Musterantwort</button>');const model=el(`<div class="model">${pr.model}</div>`);
    mb.onclick=()=>model.classList.toggle("show");box.appendChild(mb);box.appendChild(model);
    c.appendChild(box);
  });
  app.appendChild(c);
  const next=el('<button class="btn accent">Test beenden & auswerten →</button>');
  next.onclick=()=>{
    const avg=rates.reduce((s,g)=>s+g(),0)/rates.length;
    examState.speaking = 30*(avg/5);
    examResult();
  };
  app.appendChild(next);
}
function examSelfRateInline(container,label){
  const wrap=el(`<div class="row" style="margin-top:8px"><span class="small muted">${label}</span></div>`);
  let val=3;for(let n=1;n<=5;n++){const b=el(`<button class="btn ghost sm" style="min-width:38px">${n}</button>`);if(n===3)b.classList.add("accent");b.onclick=()=>{val=n;wrap.querySelectorAll("button").forEach(x=>x.classList.remove("accent"));b.classList.add("accent");};wrap.appendChild(b);}
  container.appendChild(wrap);return ()=>val;
}

// ---- ERGEBNIS ----
function examResult(){
  stopExamTimer();clear();
  const r=Math.round(examState.reading),l=Math.round(examState.listening),w=Math.round(examState.writing),s=Math.round(examState.speaking);
  const total=r+l+w+s;
  let band,cefr;
  if(total>=110){band="5.5–6";cefr="C1/C2";}else if(total>=100){band="5";cefr="C1";}
  else if(total>=90){band="4.5";cefr="B2+/C1";}else if(total>=72){band="4";cefr="B2";}
  else if(total>=60){band="3.5";cefr="B1+/B2";}else{band="≤3";cefr="≤B1";}
  const reach=total>=100;
  setBest("reading",Math.max(progress["reading"]||0,Math.round(r/30*100)));
  setBest("listening",Math.max(progress["listening"]||0,Math.round(l/30*100)));
  app.appendChild(el(`<div class="card">
    <h2>🎓 Ergebnis der Voll-Simulation</h2>
    <div class="kpi">
      <div class="b"><div class="n">${total}</div><div class="l">geschätzt /120</div></div>
      <div class="b"><div class="n">${band}</div><div class="l">Band (1–6)</div></div>
      <div class="b"><div class="n">${cefr}</div><div class="l">CEFR</div></div>
    </div>
    <div class="result ${reach?'good':'mid'}" style="margin-top:14px">${reach?'🎯 Auf Kurs zum Mannheim-Ziel (≥100/C1)!':'Noch unter dem Mannheim-Ziel von 100/120 – weiter üben!'}</div>
    <h3>Bereiche (je 0–30)</h3>
    <div class="kpi">
      <div class="b"><div class="n">${r}</div><div class="l">Reading<br>(${examState.rPath} Block)</div></div>
      <div class="b"><div class="n">${l}</div><div class="l">Listening<br>(${examState.lPath} Block)</div></div>
      <div class="b"><div class="n">${w}</div><div class="l">Writing</div></div>
      <div class="b"><div class="n">${s}</div><div class="l">Speaking</div></div>
    </div>
    <p class="muted small" style="margin-top:12px">Reading & Listening wurden <b>nach Blockschwierigkeit gewichtet</b>: Wer in den schweren Block geroutet wurde und ihn meistert, erreicht den höchsten Score; der leichte Pfad ist – wie im echten adaptiven Test – nach oben gedeckelt. Writing/Speaking beruhen auf deiner Selbsteinschätzung und sind als Orientierung zu verstehen, keine offizielle Bewertung.</p>
  </div>`));
  // Auflösung Reading & Listening (wie im Einstieg versprochen)
  if(examState.review&&examState.review.length){
    const rev=el(`<div class="card"><h3 style="margin-top:0">📋 Auflösung – Reading &amp; Listening</h3><p class="muted small">Deine Antworten im Vergleich zur Lösung. (Writing &amp; Speaking laufen über Selbsteinschätzung mit Musterlösung.)</p></div>`);
    examState.review.forEach(block=>{
      rev.appendChild(el(`<h4 style="margin:14px 0 4px;color:var(--navy)">${block.title}</h4>`));
      block.items.forEach((it,i)=>{
        const ok=it.chosen===it.answer;
        const yours=it.chosen!=null?it.options[it.chosen]:"— (keine Antwort)";
        const q=el(`<div class="q" style="margin:8px 0"><div class="qt">${i+1}. ${it.q}</div></div>`);
        const yourLine=el(`<div class="rev-line ${ok?'good':'low'}"></div>`);
        yourLine.textContent=`${ok?'✓':'✗'} Deine Antwort: ${yours}`;
        q.appendChild(yourLine);
        if(!ok){const sol=el('<div class="rev-line good"></div>');sol.textContent="✓ Richtig: "+it.options[it.answer];q.appendChild(sol);}
        if(it.explain)q.appendChild(el(`<div class="expl show">${it.explain}</div>`));
        rev.appendChild(q);
      });
    });
    app.appendChild(rev);
  }
  const again=el('<button class="btn">Nochmal simulieren</button>');again.onclick=viewExam;
  app.appendChild(again);app.appendChild(backBtn());
}

  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}

/* ---------- Start ---------- */
dashboard();
