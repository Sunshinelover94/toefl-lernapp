<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f3a5f">
<title>TOEFL Lernapp – Mannheim Master in Management</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --navy:#1f3a5f; --navy2:#2c5282; --accent:#2a9d8f; --bg:#f4f6f9; --card:#ffffff;
  --txt:#1d2733; --muted:#5b6b7d; --line:#e2e8f0; --ok:#2e7d4f; --okbg:#e6f4ec;
  --bad:#c0392b; --badbg:#fbeae8; --warnbg:#fff6e5; --warn:#8a6d3b; --shadow:0 1px 3px rgba(0,0,0,.08),0 6px 18px rgba(0,0,0,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.55;-webkit-text-size-adjust:100%}
.wrap{max-width:760px;margin:0 auto;padding:0 16px 96px}
header.app{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:18px 16px;box-shadow:var(--shadow);position:sticky;top:0;z-index:20}
header.app .wrap{padding-bottom:0}
header.app h1{font-size:18px;margin:0 0 2px;font-weight:700;letter-spacing:.2px}
header.app p{margin:0;font-size:12.5px;opacity:.9}
.bar{height:8px;background:rgba(255,255,255,.25);border-radius:6px;margin-top:10px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .4s}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .05s,background .2s}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line)}
.btn.accent{background:var(--accent)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0;box-shadow:var(--shadow)}
.card h2{margin:0 0 6px;font-size:19px}
.card h3{margin:18px 0 6px;font-size:15.5px;color:var(--navy)}
.muted{color:var(--muted)}
.small{font-size:13px}
.pill{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:999px;background:#eef2f7;color:var(--navy2);margin-left:6px;vertical-align:middle}
.grid{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:560px){.grid.two{grid-template-columns:1fr 1fr}}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);cursor:pointer;text-align:left;transition:transform .06s,border-color .2s}
.tile:hover{border-color:var(--navy2)}
.tile:active{transform:translateY(1px)}
.tile .t{font-weight:700;font-size:16px;margin-bottom:2px;color:var(--navy)}
.tile .d{font-size:13px;color:var(--muted)}
.tile .st{font-size:12px;margin-top:8px;font-weight:600}
.tile .st.done{color:var(--ok)}
.back{background:none;border:none;color:var(--navy);font-weight:600;font-size:14px;cursor:pointer;padding:14px 0 4px;display:inline-flex;gap:6px;align-items:center}
.q{margin:14px 0;padding:14px;border:1px solid var(--line);border-radius:12px;background:#fcfdff}
.q .qt{font-weight:600;margin-bottom:8px}
.opt{display:block;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;margin:7px 0;cursor:pointer;background:#fff;font-size:14.5px}
.opt:hover{border-color:var(--navy2)}
.opt.sel{border-color:var(--navy);background:#eef3fb}
.opt.correct{border-color:var(--ok);background:var(--okbg)}
.opt.wrong{border-color:var(--bad);background:var(--badbg)}
.optmark{margin-left:8px;font-size:11.5px;font-weight:700;white-space:nowrap}
.optmark.ok{color:var(--ok)}
.optmark.no{color:var(--bad)}
.opt input{margin-right:9px}
.expl{margin-top:8px;font-size:13.5px;padding:10px;border-radius:8px;background:var(--okbg);border:1px solid #cfe8d8;display:none}
.expl.show{display:block}
.result{font-weight:700;font-size:16px;padding:12px;border-radius:10px;margin-top:12px;text-align:center}
.result.good{background:var(--okbg);color:var(--ok)}
.result.mid{background:var(--warnbg);color:var(--warn)}
.result.low{background:var(--badbg);color:var(--bad)}
input[type=text],textarea{width:100%;font-family:inherit;font-size:15px;padding:10px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--txt)}
textarea{min-height:170px;resize:vertical;line-height:1.5}
.blank{display:inline-block;width:120px;margin:0 2px;padding:4px 6px;font-size:14px;border:1.5px solid var(--navy2);border-radius:7px}
.blank.ok{border-color:var(--ok);background:var(--okbg)}
.blank.no{border-color:var(--bad);background:var(--badbg)}
.sol{font-size:13px;font-weight:700;margin:0 4px;white-space:nowrap}
.sol.ok-mark{color:var(--ok)}
.sol.no-mark{color:var(--bad)}
.rev-line{text-align:left;margin:5px 0;padding:8px 10px;border-radius:8px;font-size:13.5px;font-weight:600}
.rev-line.good{background:var(--okbg);color:var(--ok)}
.rev-line.low{background:var(--badbg);color:var(--bad)}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
.chip{display:inline-block;background:#eef3fb;border:1.5px solid var(--line);border-radius:9px;padding:7px 11px;font-size:14.5px;cursor:pointer;user-select:none}
.chip:hover{border-color:var(--navy2)}
.chip.used{opacity:.35;pointer-events:none}
.answerbox{min-height:46px;border:1.5px dashed var(--line);border-radius:10px;padding:8px;margin-top:8px;display:flex;flex-wrap:wrap;gap:7px;background:#fff}
.answerbox .chip{background:#fff;border-color:var(--navy2)}
.timer{font-variant-numeric:tabular-nums;font-weight:700;font-size:18px;color:var(--navy)}
.timer.warn{color:var(--bad)}
.flash{min-height:150px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:18px;border:1px solid var(--line);border-radius:14px;background:#fcfdff}
.flash .w{font-size:26px;font-weight:800;color:var(--navy)}
.flash .ex{font-size:14px;color:var(--muted);margin-top:8px;font-style:italic}
.flash .de{font-size:20px;font-weight:700;color:var(--accent);margin-top:14px;display:none}
.flash .de.show{display:block}
.counter{font-size:13px;color:var(--muted);text-align:center;margin-top:6px}
.note{font-size:12.5px;color:var(--muted);background:var(--warnbg);border:1px solid #f0e0bf;border-radius:9px;padding:9px 11px;margin:10px 0}
.audiobtn{font-size:15px}
.rubric{font-size:13.5px;background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:12px}
.rubric li{margin:3px 0}
.model{font-size:14px;background:var(--okbg);border:1px solid #cfe8d8;border-radius:10px;padding:12px;margin-top:10px;white-space:pre-wrap;display:none}
.model.show{display:block}
.check{display:flex;gap:9px;align-items:flex-start;font-size:14px;margin:6px 0}
.check input{margin-top:3px;width:18px;height:18px;flex:none}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.kpi .b{flex:1;min-width:120px;background:#f7f9fc;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.kpi .b .n{font-size:24px;font-weight:800;color:var(--navy)}
.kpi .b .l{font-size:12px;color:var(--muted)}
footer{text-align:center;font-size:12px;color:var(--muted);padding:24px 0}
.hidden{display:none!important}
.steps{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.steps button{flex:1;min-width:64px;font-size:12px;padding:8px 4px;border:1.5px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;color:var(--navy2);font-weight:600}
.steps button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.steps button.done{border-color:var(--ok);color:var(--ok)}
</style>
</head>

      text: "Effective time {management} is essential for graduate students. By setting clear {priorities} and breaking large tasks into smaller steps, students can reduce {stress} and meet deadlines. A realistic {schedule} also helps to balance coursework with personal {responsibilities}.",

{ id:"cw_networking", text:"Career advisors often remind students that professional {networking} is not merely about collecting contacts. Building genuine {relationships} takes time, and a thoughtful follow-up message can leave a lasting {impression}. Attending industry events also helps graduates stay {informed} about emerging trends and hidden job {opportunities}.", answers:["networking","relationships","impression","informed","opportunities"] },
{ id:"cw_thesis", text:"Writing a master's {thesis} requires both discipline and curiosity. Students first formulate a clear research {question}, then review the existing {literature} to identify a gap. A well-structured {argument}, supported by reliable {evidence}, distinguishes outstanding work from merely competent work.", answers:["thesis","question","literature","argument","evidence"] },
{ id:"cw_supply_demand", text:"In a competitive market, prices are shaped by the interaction of {supply} and demand. When a product becomes {scarce}, consumers are usually willing to pay more, and the price tends to {rise}. Producers then have a stronger {incentive} to increase output, which gradually restores a market {equilibrium}.", answers:["supply","scarce","rise","incentive","equilibrium"] },
{ id:"cw_dorm_life", text:"Living in a shared {dormitory} can be both rewarding and challenging. Roommates must learn to {compromise} over noise, cleaning, and visitors. Establishing a few simple {rules} early on helps prevent conflict, while a willingness to {communicate} openly keeps small irritations from turning into serious {disputes}.", answers:["dormitory","compromise","rules","communicate","disputes"] },
{ id:"cw_peer_review", text:"Before a study appears in an academic {journal}, it normally undergoes peer {review}. Independent experts evaluate the methods, check whether the conclusions are {justified}, and recommend changes. This process is meant to safeguard the {credibility} of published research, even though it cannot entirely eliminate {bias}.", answers:["journal","review","justified","credibility","bias"] },
{ id:"cw_internship", text:"A summer {internship} offers students a valuable chance to apply theory in practice. Many companies use it to {assess} potential future employees, while interns gain practical {experience} and professional contacts. Those who show {initiative} and reliability are sometimes offered a permanent {position} after graduation.", answers:["internship","assess","experience","initiative","position"] },
{ id:"cw_inflation", text:"When the general level of prices rises persistently, economists describe the situation as {inflation}. As money loses its {purchasing} power, households can afford fewer goods with the same income. Central banks often respond by raising interest {rates}, which tends to slow {borrowing} and cool an overheating {economy}.", answers:["inflation","purchasing","rates","borrowing","economy"] },
{ id:"cw_group_project", text:"Group {projects} are a common feature of business programs. Success depends less on individual brilliance than on effective {collaboration}. Teams that distribute {tasks} fairly and set realistic {deadlines} tend to perform well, whereas poor coordination quickly leads to {frustration} and missed targets.", answers:["projects","collaboration","tasks","deadlines","frustration"] },
{ id:"cw_lecture_notes", text:"Many first-year students underestimate the importance of taking good lecture {notes}. Rather than transcribing every word, effective listeners {summarize} the main ideas in their own words. Reviewing these notes shortly after class strengthens {memory} and reveals any points that remain {unclear}, making later revision far more {productive}.", answers:["notes","summarize","memory","unclear","productive"] },
{ id:"cw_sustainability", text:"Corporate {sustainability} has moved from the margins to the centre of business strategy. Firms are increasingly expected to reduce their environmental {impact} and to report on it {transparently}. Investors, too, now scrutinise whether a company's promises are {credible} or merely a form of marketing {greenwashing}.", answers:["sustainability","impact","transparently","credible","greenwashing"] },
{ id:"cw_exam_stress", text:"As exams approach, many students experience a noticeable rise in {anxiety}. Counsellors suggest that careful {preparation}, regular breaks, and sufficient {sleep} can keep pressure within manageable limits. Maintaining a balanced {routine} is often more effective than last-minute cramming, which tends to undermine both {concentration} and confidence.", answers:["anxiety","preparation","sleep","routine","concentration"] }
      ]

      questions: [

{
  id:"dl_lab_safety",
  level:"easy",
  passage:"NOTICE — Statistics Computer Lab (Room A3)\n\nThe computer lab is reserved for enrolled students of the Faculty of Business. Access requires your campus card; visitors must register at the help desk. Food and hot drinks are not permitted near the workstations, but bottled water with a sealed cap is allowed. Please save your work to your cloud account, as all local files are deleted automatically every night. If a machine freezes, report it on the paper list next to the printer rather than restarting it yourself. The lab closes thirty minutes earlier than the building during the examination period.",

{

{

  questions:[

    {q:"What does it cost to collect a removed bike?", options:["Nothing","Ten euros","Two euros","A monthly fee"], answer:1, explain:"„A handling fee of ten euros applies to collect a removed bike“."},

{

{

{
  id:"dl_internship_credit",
  level:"easy",
  passage:"REGULATION — Internship Credit (Management Programme)\n\nStudents may earn up to six credits for an internship completed during their studies. The internship must last at least eight weeks and be relevant to the field of management. To receive credit, students submit a short reflective report and a signed confirmation from the host company. Internships completed before enrolment in the programme are not eligible. The report is graded pass or fail only and does not affect the grade-point average. Students are advised to have the placement approved by the academic coordinator before it begins, as approval cannot be given afterwards.",
  questions:[

    {q:"It can be inferred that approval should be sought:", options:["after the internship","before the internship begins","only if it fails","at graduation"], answer:1, explain:"Inferenz: „approval cannot be given afterwards“ → man muss vorher die Genehmigung einholen."}

{
  id:"dl_locker_rental",

  passage:"NOTICE — Student Lockers\n\nLockers on the ground floor can be rented for one semester. To rent one, pay the deposit of twenty euros at the porter's office and choose a free locker from the list. The deposit is fully refunded when you return the key in working condition at the end of the semester. Lockers not emptied by the last day of the semester will be opened by staff, and the contents kept for thirty days before disposal. Do not share your locker code with other students; you remain responsible for anything stored inside, including items belonging to others.",
  questions:[

    academic: {
      title: "Read an Academic Passage",
      passage: "The Urban Heat Island Effect\n\n[1] Cities are typically several degrees warmer than the surrounding countryside, a phenomenon known as the urban heat island effect. Dark surfaces such as asphalt and rooftops absorb solar radiation during the day and release it slowly at night, keeping urban temperatures elevated. [2] The dense concentration of buildings also limits airflow, while waste heat from vehicles and air conditioning adds further warmth. [3] As a result, residents of large cities often experience hotter nights and higher energy demand for cooling. [4] Planners have proposed several remedies, including planting trees, installing reflective \"cool\" roofs, and creating green corridors that channel cooler air into the city center. Although no single measure eliminates the effect, a combination of strategies can meaningfully reduce peak temperatures.",
      questions: [
        {type:"Factual", q:"According to the passage, why do urban temperatures stay high at night?", options:["Trees release stored heat","Dark surfaces release absorbed radiation slowly","The countryside warms the city","Air conditioning cools the streets"], answer:1, explain:"Factual: dark surfaces „release it slowly at night."},
        {type:"Negative Factual", q:"All of the following are mentioned as causes EXCEPT:", options:["Waste heat from vehicles","Limited airflow between buildings","Heat from air conditioning","Increased rainfall over cities"], answer:3, explain:"Negative Factual: Niederschlag wird nicht genannt; die anderen drei schon."},
        {type:"Vocabulary", q:"The word \"remedies\" in the passage is closest in meaning to:", options:["solutions","dangers","measurements","delays"], answer:0, explain:"Vocabulary-in-Context: „remedies“ = Lösungen/Abhilfen."},
        {type:"Inference", q:"It can be inferred that a single measure alone:", options:["fully solves the problem","is illegal in most cities","is not sufficient on its own","increases temperatures"], answer:2, explain:"Inference: „no single measure eliminates the effect“ → eines allein reicht nicht."},
        {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"This trapped heat is one reason the effect is strongest after sunset.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:0, explain:"Sentence Insertion: bezieht sich auf das langsame Abgeben der Wärme aus [1]."},
        {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Cities should ban all vehicles.","Urban areas are warmer than rural ones, and combined strategies can reduce the effect.","Trees are the only solution to heat.","Air conditioning cools entire cities."], answer:1, explain:"Prose Summary: Hauptaussage = Städte sind wärmer; kombinierte Maßnahmen helfen."}

{ id:"ac_networks", level:"mid", passage:"The Power of Weak Ties\n\n[1] When people search for a job, they often assume that close friends and family will be most useful. Research in sociology suggests the opposite: many opportunities arrive through so-called weak ties, that is, acquaintances we rarely see. [2] Because close contacts move in the same circles as we do, they tend to know about the same openings. Distant acquaintances, by contrast, are connected to different networks and therefore carry information we would not otherwise encounter. [3] This insight has practical implications for students. Attending a single guest lecture or a cross-faculty workshop can introduce a person to dozens of loose contacts, each a potential bridge to a new field. [4] The lesson is not to neglect friendships, but to recognise that a broad and varied network often delivers more novel information than a small, tightly knit group of intimates.", questions:[ {type:"Factual", q:"According to the passage, why are weak ties valuable?", options:["They are emotionally closer to us","They connect us to different networks and new information","They meet us more frequently","They share all of our interests"], answer:1, explain:"Factual: lose Kontakte sind mit anderen Netzwerken verbunden und liefern neue Informationen."}, {type:"Negative Factual", q:"Which of the following is NOT stated in the passage?", options:["Close contacts often know about the same openings","Guest lectures can introduce many loose contacts","Weak ties guarantee a higher salary","A varied network delivers more novel information"], answer:2, explain:"Negative Factual: ein hoeheres Gehalt wird nirgends behauptet; die anderen drei stehen im Text."}, {type:"Vocabulary", q:"The word \"intimates\" in the passage is closest in meaning to:", options:["strangers","close companions","employers","rivals"], answer:1, explain:"Vocabulary-in-Context: intimates = enge Vertraute/Freunde."}, {type:"Inference", q:"It can be inferred that a student who only relies on close friends:", options:["will never find work","may miss information available elsewhere","has too many contacts","ignores guest lectures"], answer:1, explain:"Inference: enge Freunde kennen dieselben Stellen, also entgehen einem andere Informationen."}, {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"In other words, they are more likely to repeat what we already know.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:1, explain:"Sentence Insertion: knuepft an [2] an, wo erklaert wird, dass enge Kontakte dieselben Stellen kennen."}, {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Friendships are useless for finding a job.","Acquaintances we rarely see often provide more novel information than close contacts.","Students should avoid guest lectures.","Only family can help with careers."], answer:1, explain:"Prose Summary: Hauptaussage = seltene Bekannte liefern oft neuere Informationen als enge Kontakte."} ] },
{ id:"ac_spacing_effect", level:"mid", passage:"How Spaced Study Improves Memory\n\n[1] Many students prepare for examinations by cramming, concentrating all their study into a single long session the night before. Decades of research on memory indicate that this strategy is inefficient. [2] When the same amount of study is distributed across several shorter sessions, retention improves markedly, a phenomenon known as the spacing effect. The brain appears to consolidate information more firmly when learning is interrupted by intervals of rest or sleep. [3] Each time material is recalled after a delay, the effort of retrieval strengthens the memory, making it easier to access later. Cramming, by contrast, produces a fragile familiarity that fades within days. [4] Educators therefore recommend planning revision over weeks rather than hours, even though the steady approach feels less productive in the moment than an intense final push.", questions:[ {type:"Factual", q:"According to the passage, what is the spacing effect?", options:["Studying everything in one long session","Improved retention when study is spread over several sessions","Forgetting material after sleep","Reading material aloud"], answer:1, explain:"Factual: der Spacing-Effekt = bessere Behaltensleistung bei verteiltem Lernen."}, {type:"Vocabulary", q:"The word \"fragile\" in the passage is closest in meaning to:", options:["easily broken or weak","permanent","detailed","expensive"], answer:0, explain:"Vocabulary-in-Context: fragile = zerbrechlich, schwach."}, {type:"Inference", q:"It can be inferred that students who cram:", options:["remember material for years","may forget much of it within a few days","never pass exams","study more efficiently"], answer:1, explain:"Inference: a fragile familiarity that fades within days -> schnelles Vergessen."}, {type:"Negative Factual", q:"All of the following are mentioned EXCEPT:", options:["Rest or sleep aids consolidation","Retrieval after a delay strengthens memory","Cramming is efficient","Revision should be planned over weeks"], answer:2, explain:"Negative Factual: der Text nennt Cramming gerade als ineffizient, nicht als effizient."}, {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"This is one reason teachers warn against leaving everything to the last minute.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:3, explain:"Sentence Insertion: passt zu [4], wo die Empfehlung gegen den finalen Endspurt steht."}, {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Sleep harms memory.","Distributing study over time improves retention more than cramming.","Cramming is the best exam strategy.","Memory cannot be improved."], answer:1, explain:"Prose Summary: Hauptaussage = verteiltes Lernen schlaegt Cramming."} ] },
{ id:"ac_division_of_labour", level:"mid", passage:"Adam Smith and the Division of Labour\n\n[1] In his famous description of a pin factory, the economist Adam Smith observed that a single worker, performing every step alone, could make only a handful of pins in a day. [2] When the task was divided so that each worker specialised in one operation, such as drawing the wire, cutting it, or sharpening the point, the same number of people produced thousands of pins. Smith called this principle the division of labour. [3] Specialisation raises output because workers develop skill through repetition, lose less time switching between tasks, and create opportunities to introduce machinery suited to a narrow operation. [4] Yet Smith also warned that workers confined to a single repetitive motion might become bored and lose broader abilities, an early recognition of the human costs that efficiency can carry.", questions:[ {type:"Factual", q:"According to the passage, what did dividing the task achieve?", options:["Fewer pins were made","Each worker made everything alone","Output rose dramatically","Machinery became useless"], answer:2, explain:"Factual: durch Arbeitsteilung stieg die Produktion stark an."}, {type:"Negative Factual", q:"Which reason for higher output is NOT mentioned?", options:["Skill gained through repetition","Less time lost switching tasks","Opportunities to introduce machinery","Higher wages paid to workers"], answer:3, explain:"Negative Factual: hoehere Loehne werden als Grund nicht genannt; die anderen drei schon."}, {type:"Vocabulary", q:"The word \"confined\" in the passage is closest in meaning to:", options:["promoted","restricted","rewarded","trained"], answer:1, explain:"Vocabulary-in-Context: confined to = beschraenkt/eingeengt auf."}, {type:"Inference", q:"It can be inferred that Smith viewed the division of labour as:", options:["entirely harmful","beneficial but not without drawbacks","irrelevant to economics","impossible to apply"], answer:1, explain:"Inference: Smith lobt die Effizienz, warnt aber vor menschlichen Kosten."}, {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"The difference in productivity was enormous.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:1, explain:"Sentence Insertion: bezieht sich auf den Sprung von wenigen auf Tausende Nadeln in [2]."}, {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Pin factories are outdated.","Specialisation greatly increases output, though it may harm workers.","Workers should never specialise.","Machinery always replaces people."], answer:1, explain:"Prose Summary: Hauptaussage = Spezialisierung steigert die Produktion, kann aber Nachteile haben."} ] },
{ id:"ac_circadian_rhythm", level:"mid", passage:"The Body Clock and Student Schedules\n\n[1] Every human being carries an internal timekeeper, the circadian rhythm, which regulates sleep, alertness, and body temperature over roughly a twenty-four-hour cycle. [2] This rhythm is set partly by exposure to light, which is why bright screens late at night can delay sleep by suppressing the hormone melatonin. For many adolescents and young adults, the clock naturally shifts later, making early-morning lectures particularly difficult. [3] Studies show that students perform cognitive tasks better at times that match their personal rhythm; a person whose peak alertness falls in the late morning will struggle with an eight o'clock exam. [4] Some universities have responded by scheduling demanding courses later in the day, a small change that can measurably improve both attendance and performance.", questions:[ {type:"Factual", q:"According to the passage, what does the circadian rhythm regulate?", options:["Only body temperature","Sleep, alertness, and body temperature","Memory alone","Exam difficulty"], answer:1, explain:"Factual: der zirkadiane Rhythmus steuert Schlaf, Wachheit und Koerpertemperatur."}, {type:"Vocabulary", q:"The word \"suppressing\" in the passage is closest in meaning to:", options:["releasing","reducing or holding back","measuring","increasing"], answer:1, explain:"Vocabulary-in-Context: suppressing = unterdruecken/zurueckhalten."}, {type:"Inference", q:"It can be inferred that an early-morning exam:", options:["suits every student equally","may disadvantage students whose peak alertness comes later","is always easier","improves melatonin levels"], answer:1, explain:"Inference: wessen Hochphase spaeter liegt, ist morgens benachteiligt."}, {type:"Negative Factual", q:"All of the following are mentioned EXCEPT:", options:["Light helps set the rhythm","Screens can delay sleep","The clock shifts earlier in young adults","Later scheduling can improve performance"], answer:2, explain:"Negative Factual: bei jungen Erwachsenen verschiebt sich die Uhr nach hinten, nicht nach vorn."}, {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"In effect, they are being tested before their minds are fully awake.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:2, explain:"Sentence Insertion: knuepft an [3] an, wo die Acht-Uhr-Pruefung am persoenlichen Rhythmus scheitert."}, {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Students should never sleep.","The body clock affects learning, so timing of classes matters.","Light has no effect on sleep.","All exams should be at eight o'clock."], answer:1, explain:"Prose Summary: Hauptaussage = die innere Uhr beeinflusst das Lernen, daher zaehlt die Kurszeit."} ] },
{ id:"ac_open_access", level:"mid", passage:"The Open-Access Movement in Science\n\n[1] For much of the twentieth century, the results of academic research were published in journals that universities and individuals could read only by paying substantial subscription fees. [2] Critics argued that this arrangement was unfair, since much of the research had been funded by taxpayers, yet the public could not read the findings without paying again. From this concern grew the open-access movement, which promotes making scholarly articles freely available online. [3] Supporters claim that open access accelerates discovery, allows researchers in poorer institutions to participate, and increases the impact of published work. Publishers counter that producing reliable journals, including peer review and editing, involves real costs that must be covered somehow. [4] The debate has prompted new models in which authors or funding agencies pay a fee so that the finished article can be read by anyone without charge.", questions:[ {type:"Factual", q:"According to the passage, what does the open-access movement promote?", options:["Higher subscription fees","Making scholarly articles freely available online","Banning peer review","Closing university libraries"], answer:1, explain:"Factual: Open Access foerdert kostenlosen Online-Zugang zu Fachartikeln."}, {type:"Negative Factual", q:"Which benefit of open access is NOT mentioned?", options:["It accelerates discovery","It helps researchers at poorer institutions","It guarantees correct results","It increases the impact of work"], answer:2, explain:"Negative Factual: eine Garantie korrekter Ergebnisse wird nicht behauptet."}, {type:"Vocabulary", q:"The word \"substantial\" in the passage is closest in meaning to:", options:["small","considerable","optional","temporary"], answer:1, explain:"Vocabulary-in-Context: substantial = betraechtlich, erheblich."}, {type:"Inference", q:"It can be inferred that publishers worry mainly about:", options:["too many readers","how the costs of quality control will be paid","the speed of discovery","the size of libraries"], answer:1, explain:"Inference: Verlage betonen die realen Kosten von Peer Review und Redaktion."}, {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"They had, in a sense, already paid for the science once.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:1, explain:"Sentence Insertion: passt zu [2], wo das Argument der doppelten Bezahlung durch Steuerzahler steht."}, {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Journals should never charge anything.","Open access aims to make research free to read, raising debates over who pays the costs.","Peer review is unnecessary.","Only rich universities should publish."], answer:1, explain:"Prose Summary: Hauptaussage = Open Access will freien Lesezugang, wirft aber Kostenfragen auf."} ] },
{ id:"ac_network_effects", level:"hard", passage:"Network Effects and Market Dominance\n\n[1] In conventional markets, the value of a product to one buyer is largely independent of how many others purchase it. Certain digital goods behave very differently, exhibiting what economists call network effects: the more people use a service, the more valuable it becomes to each user. [2] A messaging application, for instance, is nearly useless if no one else has installed it, but indispensable once an entire social circle relies on it. This dynamic can produce a self-reinforcing cycle in which a popular platform attracts still more users, while smaller competitors struggle to gain a foothold. [3] The result is often a market that tips decisively toward a single dominant firm, even if its product is not technically superior. [4] Such tipping raises difficult questions for regulators, who must weigh the convenience of a unified standard against the risks of entrenched monopoly power and the suppression of innovation.", questions:[ {type:"Factual", q:"According to the passage, what is a network effect?", options:["A product becomes cheaper as more is produced","A product becomes more valuable as more people use it","A product loses value over time","A product is independent of other buyers"], answer:1, explain:"Factual: Netzwerkeffekt = der Wert steigt mit der Zahl der Nutzer."}, {type:"Vocabulary", q:"The phrase \"gain a foothold\" in the passage is closest in meaning to:", options:["lose all customers","establish an initial position","raise prices","copy a rival"], answer:1, explain:"Vocabulary-in-Context: gain a foothold = Fuss fassen, einen ersten Marktanteil gewinnen."}, {type:"Inference", q:"It can be inferred that a dominant platform:", options:["must always have the best technology","can prevail even without the best technology","never faces regulation","loses users over time"], answer:1, explain:"Inference: even if its product is not technically superior -> technische Ueberlegenheit ist nicht noetig."}, {type:"Negative Factual", q:"Which concern of regulators is NOT mentioned?", options:["Entrenched monopoly power","Suppression of innovation","The convenience of a unified standard","Excessive product variety"], answer:3, explain:"Negative Factual: zu grosse Produktvielfalt wird nicht als Sorge genannt."}, {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"Each new participant, in turn, makes the platform more attractive to the next.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:1, explain:"Sentence Insertion: beschreibt den selbstverstaerkenden Kreislauf aus [2]."}, {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Digital products are always cheaper.","Network effects can push a market toward one dominant firm, posing regulatory dilemmas.","Regulators should ban all platforms.","Smaller firms always win.","Technology quality is the only factor."], answer:1, explain:"Prose Summary: Hauptaussage = Netzwerkeffekte foerdern Marktdominanz und werfen Regulierungsfragen auf."} ] },
{ id:"ac_replication_crisis", level:"hard", passage:"The Replication Crisis in Psychology\n\n[1] A scientific finding is generally trusted only if other researchers, repeating the same procedure, obtain the same result. In the past decade, large-scale efforts to reproduce well-known psychological experiments have unsettled this assumption, for a surprising proportion of celebrated results could not be replicated. [2] Several causes have been identified. Researchers face strong incentives to publish striking, positive findings, while studies that report no effect are often rejected by journals, a tendency known as publication bias. [3] In addition, flexible analytical choices, such as deciding after the fact which measures to report, can inflate the apparent significance of weak results. [4] The episode has prompted reforms, including the pre-registration of hypotheses before data are collected and the sharing of raw data, measures intended to make the evidence behind published claims more transparent and trustworthy.", questions:[ {type:"Factual", q:"According to the passage, what unsettled trust in some psychological findings?", options:["Researchers stopped publishing","Many celebrated results could not be replicated","Journals closed down","Data were never collected"], answer:1, explain:"Factual: viele beruehmte Ergebnisse liessen sich nicht reproduzieren."}, {type:"Vocabulary", q:"The word \"inflate\" in the passage is closest in meaning to:", options:["exaggerate or overstate","measure precisely","reject","conceal"], answer:0, explain:"Vocabulary-in-Context: inflate = aufblaehen, hier uebertreiben/zu gross erscheinen lassen."}, {type:"Inference", q:"It can be inferred that publication bias tends to:", options:["favour studies reporting no effect","favour studies reporting striking positive results","eliminate all errors","slow down publishing"], answer:1, explain:"Inference: auffaellige positive Befunde werden bevorzugt veroeffentlicht."}, {type:"Negative Factual", q:"Which reform is NOT mentioned in the passage?", options:["Pre-registration of hypotheses","Sharing of raw data","Banning psychology experiments","Making evidence more transparent"], answer:2, explain:"Negative Factual: ein Verbot von Experimenten wird nicht genannt."}, {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"As a consequence, the published record may overstate how reliable an effect truly is.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:2, explain:"Sentence Insertion: folgt aus [3], wo flexible Analysen die Signifikanz aufblaehen."}, {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Psychology is not a real science.","Failures to replicate revealed flaws in research practice and prompted reforms.","All experiments are now banned.","Journals never reject studies.","Data should be kept secret."], answer:1, explain:"Prose Summary: Hauptaussage = gescheiterte Replikationen deckten Maengel auf und fuehrten zu Reformen."} ] },
{ id:"ac_comparative_advantage", level:"hard", passage:"Comparative Advantage and Trade\n\n[1] One of the most counter-intuitive ideas in economics is the principle of comparative advantage, formulated by David Ricardo in the early nineteenth century. It explains why two countries can both gain from trade even when one of them is more efficient at producing everything. [2] The key lies not in absolute efficiency but in relative cost. A country should specialise in the goods it can produce at the lowest opportunity cost, that is, by giving up the least of other goods, and trade for the rest. [3] Suppose one nation is somewhat better at making cloth and far better at making wine. Although it holds an absolute advantage in both, it gains by concentrating on wine, where its edge is greatest, and importing cloth from the other nation. [4] In this way total output rises and both parties end up with more than they could produce alone, a result that underlies much of the modern case for international trade.", questions:[ {type:"Factual", q:"According to the passage, what should a country specialise in?", options:["Goods it produces at the lowest opportunity cost","Goods no one else makes","Goods with the highest price","Every good equally"], answer:0, explain:"Factual: Spezialisierung dort, wo die Opportunitaetskosten am niedrigsten sind."}, {type:"Vocabulary", q:"The word \"counter-intuitive\" in the passage is closest in meaning to:", options:["obvious","contrary to what one would expect","mathematically simple","widely rejected"], answer:1, explain:"Vocabulary-in-Context: counter-intuitive = der Intuition zuwiderlaufend."}, {type:"Inference", q:"It can be inferred that a country with an absolute advantage in everything:", options:["should produce everything itself","can still benefit from trading","never trades","has no opportunity cost"], answer:1, explain:"Inference: auch bei absolutem Vorteil in allem lohnt sich Handel."}, {type:"Negative Factual", q:"All of the following are stated EXCEPT:", options:["Comparative advantage was formulated by Ricardo","Relative cost matters more than absolute efficiency","Trade leaves both parties worse off","Specialisation can raise total output"], answer:2, explain:"Negative Factual: der Text sagt das Gegenteil - beide Seiten gewinnen."}, {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"What matters is the cost of one good measured in terms of the other.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:1, explain:"Sentence Insertion: praezisiert das relative-Kosten-Argument aus [2]."}, {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Only the most efficient country should produce goods.","Countries gain from trade by specialising according to comparative, not absolute, advantage.","Trade always harms weaker nations.","Opportunity cost is irrelevant to trade.","Ricardo opposed international trade."], answer:1, explain:"Prose Summary: Hauptaussage = Handel nutzt beiden ueber komparative, nicht absolute Vorteile."} ] },
{ id:"ac_peer_review", level:"hard", passage:"How Peer Review Shapes Scholarship\n\n[1] Before an article appears in most academic journals, it passes through peer review, a process in which independent experts assess the work and recommend whether it should be published. The aim is to filter out flawed methods, unsupported conclusions, and unoriginal contributions. [2] Reviewers typically remain anonymous, which is meant to encourage candid judgement free from social pressure. Yet the same anonymity can shield careless or biased assessments from accountability, and critics note that the system is slow and unpaid, relying on the goodwill of busy scholars. [3] Peer review is also poorly suited to detecting deliberate fraud, since reviewers usually examine a manuscript rather than the underlying data. [4] Despite these limitations, most researchers regard it as the least imperfect mechanism available for maintaining quality, and proposals for reform tend to refine the process rather than abandon it.", questions:[ {type:"Factual", q:"According to the passage, what is the aim of peer review?", options:["To pay reviewers fairly","To filter out flawed methods and unsupported conclusions","To speed up publication","To guarantee fame for authors"], answer:1, explain:"Factual: Ziel ist das Aussortieren fehlerhafter Methoden und unbelegter Schluesse."}, {type:"Vocabulary", q:"The word \"candid\" in the passage is closest in meaning to:", options:["frank and honest","cautious","secret","positive"], answer:0, explain:"Vocabulary-in-Context: candid = offen, ehrlich."}, {type:"Negative Factual", q:"Which criticism of peer review is NOT mentioned?", options:["It is slow","Reviewers are unpaid","It is poorly suited to detecting fraud","It rejects too many good papers"], answer:3, explain:"Negative Factual: dass es zu viele gute Arbeiten ablehnt, wird nicht behauptet."}, {type:"Inference", q:"It can be inferred that most researchers:", options:["want to abolish peer review entirely","accept peer review despite its flaws","consider it perfect","prefer to skip review"], answer:1, explain:"Inference: the least imperfect mechanism available -> man akzeptiert es trotz Maengeln."}, {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"A determined fraudster can simply fabricate convincing numbers.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:2, explain:"Sentence Insertion: illustriert [3], wonach Gutachter das Manuskript statt der Rohdaten pruefen."}, {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Peer review should be abandoned.","Peer review has notable weaknesses but is still seen as the best available quality check.","Reviewers are always biased.","Fraud is easy to detect through review.","Journals do not use peer review."], answer:1, explain:"Prose Summary: Hauptaussage = Peer Review hat Schwaechen, gilt aber als bestes verfuegbares Qualitaetsinstrument."} ] }
      ]
    }
  },

      script: "In today's session we'll look at the concept of opportunity cost. Opportunity cost is the value of the next best alternative that you give up when you make a choice. For example, if a company invests its capital in a new factory, the opportunity cost is the return it could have earned by investing that money elsewhere, say in bonds. The key point is that opportunity cost is not always about money; it can also involve time. Choosing to spend an evening studying means giving up the leisure you could have enjoyed instead.",

    interview: {
      title: "Take an Interview",
      intro: "Beantworte die Interviewfragen mündlich. Nimm dich auf, höre dir die Antwort an und bewerte dich mit der Checkliste. Eine Musterantwort findest du darunter.",
      prompts: [
        {q:"Tell me about a subject you enjoyed studying and why.",
         model:"One subject I really enjoyed was statistics. At first it seemed quite abstract, but I gradually realised how useful it is for making decisions based on real data. I liked that every problem had a clear, logical solution, and I found it satisfying to interpret results and explain them to others."},
        {q:"What do you think are the advantages of studying abroad?",
         model:"Studying abroad has several advantages. First, you improve your language skills much faster because you use the language every day. Second, you experience a different academic culture, which broadens your perspective. Finally, living independently in a new country builds confidence and makes you more adaptable."},
        {q:"Describe a goal you would like to achieve in the next few years.",
         model:"In the next few years I would like to complete a master's degree in management and gain practical experience through an internship abroad. My long-term goal is to work in international project management, so I want to strengthen both my analytical skills and my ability to work with people from different backgrounds."},
        {q:"Do you prefer working in a team or working alone? Why?",
         model:"It depends on the task, but generally I prefer working in a team. Different people bring different ideas, and discussing problems usually leads to better solutions. That said, for tasks that require deep concentration, such as writing or detailed analysis, I find that working alone is more efficient."},
        {id:"iv_time_management",q:"How do you manage your time when you have several deadlines at once?",model:"When several deadlines pile up, I rely on a simple system. First, I list every task and note its due date, so I can see the whole picture. Then I rank them by urgency and importance, and I block fixed times in my calendar for the hardest ones. For example, last semester I had two papers and an exam in the same week, so I finished the longer paper early and used short evening sessions for revision. This kept me calm and on track, and I submitted everything on time."},
{id:"iv_group_project_conflict",q:"Describe a time when there was a disagreement in a group project. How did you handle it?",model:"In one marketing project, two members disagreed about which strategy to present. At first the discussion became tense, so I suggested we step back and list the pros and cons of each option on a shared document. Then we asked a simple question: which idea best fits the brief and the data we had? This made the choice objective rather than personal, so the group quickly reached a compromise that combined both ideas. In the end, we delivered a stronger presentation, and I learned that structuring a debate calmly is often more useful than insisting you are right."},
{id:"iv_online_vs_inperson",q:"Do you learn better from online lectures or in-person classes? Explain.",model:"It depends on the subject, but overall I learn better in person. The main reason is interaction: I can ask questions immediately, and informal discussions with classmates often clarify difficult ideas. Online lectures are convenient, and I do like being able to pause and rewatch recordings, but I tend to lose focus at home. For instance, during the pandemic I struggled with online statistics, yet the same topic felt much clearer once we returned to a classroom. So for me, in-person teaching works best, while online material is a useful supplement for review."},
{id:"iv_part_time_job",q:"What are the benefits of having a part-time job while studying?",model:"A part-time job offers several benefits while you study. First, it provides extra income, which reduces financial pressure and makes student life more comfortable. Second, it builds practical skills such as communication, punctuality, and teamwork that are hard to learn from textbooks. For example, I worked at a campus café, and dealing with busy customers improved my time management and confidence under pressure. The main risk is that work can eat into study hours, so you have to set clear limits. Used wisely, though, a part-time job complements your degree rather than competing with it."},
{id:"iv_choosing_university",q:"What factors should students consider when choosing a university?",model:"Students should weigh several factors before choosing a university. The most important, in my view, is the quality and reputation of the specific programme, because that shapes both your learning and your future job prospects. Cost and location also matter, since living expenses and distance from home affect daily life. For example, when I researched management programmes, I compared the curriculum, the exchange options, and the city, not just the overall ranking. So I would advise students to look beyond prestige and ask whether a university truly fits their goals, budget, and personal situation."},
{id:"iv_supply_demand_example",q:"Can you explain a basic economic concept using an everyday example?",model:"A good example is the relationship between supply and demand. The basic idea is that prices rise when many people want something but little of it is available. Take flights during the holidays: demand is very high, but the number of seats is limited, so airlines raise their prices. Then, once the holidays end, demand falls and tickets become much cheaper again. I find this concept useful because it explains everyday situations, from concert tickets to rents in a popular city. So even simple shopping decisions are influenced by these forces without us noticing."},
{id:"iv_handling_stress",q:"How do you deal with stress during exam periods?",model:"During exam periods I try to manage stress in a structured way. First, I plan my revision early so the workload is spread out instead of crammed into the final nights. Then I make sure to keep some healthy habits, such as short walks and enough sleep, because they really affect concentration. For example, before my last exams I studied in focused blocks and took a real break every afternoon, which kept me from burning out. It is not always easy, but this balance helps me stay clear-headed, so I usually perform better than when I simply work non-stop."},
{id:"iv_scientific_method",q:"Why do you think research and evidence are important in academic study?",model:"Research and evidence are essential because they separate reliable knowledge from mere opinion. In academic work you cannot just claim something is true; you have to support it with data, experiments, or credible sources. For example, in a seminar I argued that a marketing approach was effective, but I only convinced the group once I presented survey results to back it up. This habit also teaches you to question your own assumptions and to update your view when new findings appear. So learning to use evidence carefully is one of the most valuable skills a university can give you."},
{id:"iv_living_on_campus",q:"Would you prefer to live on campus or off campus during your studies? Why?",model:"I would prefer to live on campus, at least in the first year. The main reason is convenience: you are close to lectures, the library, and other students, so it is easy to join study groups and social events. Living off campus is often quieter and sometimes cheaper, but the daily commute can waste a lot of time. For example, a friend of mine lost almost two hours a day travelling, which left her exhausted. So for me, the time saved and the sense of community on campus outweigh the extra privacy of living further away."}
      ],
      checklist: ["Habe ich klar und ohne lange Pausen gesprochen?","Habe ich die Frage direkt beantwortet?","Habe ich ein Beispiel oder einen Grund genannt?","War die Aussprache verständlich?","Habe ich Verbindungswörter benutzt (first, because, however)?"]
    }
  },

    email: {
      title: "Write an Email",
      intro: "Schreibe eine kurze, angemessene E-Mail (ca. 7 Minuten). Ziel: ~80–120 Wörter, klare Struktur, höflicher Ton.",
      timer: 7*60,
      prompts: [
        {q:"You missed an important lecture because you were ill. Write an email to your professor: apologise, explain briefly, and ask what you can do to catch up.",
         model:"Dear Professor Müller,\n\nI am writing to apologise for missing yesterday's lecture on strategic management. Unfortunately, I was unwell and unable to attend. I would be very grateful if you could let me know whether the slides are available online and what topics I should review. If there is any additional material or a task I missed, I am happy to complete it. Thank you very much for your understanding.\n\nKind regards,\nMaria Schmidt"},
        {q:"Your study group needs to reschedule a meeting. Write an email to the other members: explain why, suggest a new time, and ask for confirmation.",
         model:"Hi everyone,\n\nI hope you are all doing well. Unfortunately, I have a conflict with our meeting on Wednesday afternoon. Would it be possible to move it to Thursday at 4 p.m. in the library instead? That time should still give us enough time to finish the presentation before the deadline. Please let me know if this works for you, or suggest another time if it does not. Thanks a lot, and see you soon!\n\nBest,\nJonas"},
        {id:"em_extension_request", q:"You are unable to finish your term paper for your microeconomics course on time because key sources arrived late from the library. Write an email to your professor: explain the situation, request a short extension, and propose a new submission date.", model:"Dear Professor Weber,\n\nI am writing regarding my term paper for your microeconomics course, which is due on Friday. Unfortunately, two key sources I requested through the library only became available this week, which has delayed my analysis considerably. I would therefore like to ask whether a short extension would be possible. If you agree, I could submit the completed paper by next Wednesday. I want to ensure the work meets the standard you expect rather than hand in something incomplete. Thank you very much for considering my request, and please let me know whether this would be acceptable.\n\nKind regards,\nLena Hoffmann"},
{id:"em_office_hours", q:"You did not understand a concept (price elasticity) covered in a recent seminar. Write an email to your tutor: explain what is unclear, ask to meet during office hours, and propose two possible times.", model:"Dear Mr. Becker,\n\nI hope you are well. After Tuesday's seminar I have been reviewing the topic of price elasticity, but I am still unsure how to interpret the results when demand is inelastic. I would find it very helpful to discuss this with you in person. Could we possibly meet during your office hours this week? I am available on Wednesday after 2 p.m. or on Thursday morning before eleven, but I am happy to adapt to your schedule. Thank you very much for your time, and I look forward to your reply.\n\nBest regards,\nDavid Krause"},
{id:"em_group_project_role", q:"Your team is starting a group project for a marketing module and roles have not yet been assigned. Write an email to your group members: suggest how to divide the work, volunteer for one part, and ask everyone to confirm their preferences by the weekend.", model:"Hi everyone,\n\nNow that our marketing project has officially started, I think it would help to agree on roles early so we can work efficiently. I would suggest splitting the task into research, analysis, slide design, and presentation. Personally, I am happy to take on the market research section, since I have already gathered some useful sources. Could each of you let me know which part you would prefer? If we confirm our roles by Sunday evening, we will have plenty of time to coordinate before the deadline. Thanks a lot, and looking forward to working with you all!\n\nBest,\nNina"},
{id:"em_internship_inquiry", q:"You saw an advertisement for a summer internship at a consulting firm. Write an email to the recruiter: introduce yourself, express your interest, and ask about the application deadline and required documents.", model:"Dear Ms. Schneider,\n\nI am a second-year Management student at the University of Mannheim, and I am writing to express my strong interest in the summer internship advertised on your website. The position appeals to me because it would allow me to apply my analytical skills in a practical consulting environment. I would be grateful if you could tell me when the application deadline is and which documents you require, for example a CV, cover letter, or academic transcript. Thank you very much for your time. I look forward to hearing from you and would welcome the opportunity to apply.\n\nKind regards,\nFelix Wagner"},
{id:"em_library_complaint", q:"The opening hours of the university library were recently shortened during the exam period. Write a polite email to the library administration: explain why this is a problem, suggest an improvement, and ask whether the hours can be reconsidered.", model:"Dear Library Administration,\n\nI am writing on behalf of several students regarding the recently reduced opening hours during the exam period. While we understand that staffing can be challenging, the shorter hours make it difficult to find quiet study space when demand is highest. Many of us rely on the library in the evenings, as our shared flats are often noisy. Would it be possible to extend the opening hours, at least until ten p.m., for the remaining weeks of the exam period? We would be very grateful if you could reconsider the schedule. Thank you for your attention to this matter.\n\nKind regards,\nSophie Brandt"},
{id:"em_conference_apology", q:"You agreed to present at a student research conference but can no longer attend because of a scheduling conflict. Write an email to the organiser: apologise, explain the reason, and offer an alternative such as a recorded presentation.", model:"Dear Dr. Lehmann,\n\nI am writing to apologise sincerely, as I will unfortunately be unable to attend the student research conference next Friday. A mandatory examination has been rescheduled to the same day, leaving me with a direct conflict that I cannot avoid. I am very sorry for any inconvenience this may cause to your programme. To make up for my absence, I would be glad to submit a recorded version of my presentation, or to share my slides with a colleague who could present on my behalf. Please let me know which option you would prefer. Thank you for your understanding.\n\nKind regards,\nLukas Fischer"},
{id:"em_data_request", q:"You need recent sales figures from a company for an economics case study. Write an email to the company's communications department: introduce your project, request the data politely, and explain how the information will be used.", model:"Dear Sir or Madam,\n\nI am a Management student at the University of Mannheim, currently working on a case study about pricing strategies in the retail sector. As part of this academic project, I would be very grateful if you could share any publicly available figures on your sales development over the past three years. The data would be used strictly for educational purposes and would, of course, be cited appropriately. If certain information is confidential, I fully understand, and any summary figures you can provide would already be a great help. Thank you very much for your time and consideration.\n\nKind regards,\nMarie Albrecht"},
{id:"em_feedback_thanks", q:"A professor gave you detailed feedback on a draft of your bachelor thesis. Write an email in reply: thank them, briefly mention one change you will make, and ask a follow-up question about the structure.", model:"Dear Professor Hartmann,\n\nThank you very much for the detailed feedback on the draft of my bachelor thesis. Your comments were extremely helpful, particularly regarding the clarity of my argument. Following your advice, I will revise the literature review so that it focuses more closely on the studies relevant to my research question. I do have one follow-up question about the structure: would you recommend presenting the methodology before or after the theoretical framework? I want to ensure the chapters follow a logical order. Thank you again for your guidance, and I look forward to your suggestion.\n\nKind regards,\nTim Vogel"}
      ]
    },
    discussion: {
      title: "Write for an Academic Discussion",
      intro: "Reagiere wie in einem Online-Diskussionsforum (ca. 10 Minuten). Ziel: ≥ 100 Wörter, eigene Meinung + Begründung + Beispiel, Bezug auf die Frage.",
      timer: 10*60,
      prompts: [
        {q:"Professor: \"Some people believe universities should focus mainly on practical skills that prepare students for jobs. Others think the main goal should be broad academic knowledge. What is your view?\"",
         model:"In my opinion, universities should balance both, but if I had to choose, I would lean towards broad academic knowledge. Practical skills are important, yet they often become outdated as technologies and job requirements change. A strong foundation in analytical thinking and theory, by contrast, allows graduates to adapt to new situations throughout their careers. For example, a manager who understands the principles of economics can apply them to industries that did not even exist when they studied. That said, universities should still include internships and projects so that students can connect theory to real practice."},
        {q:"Professor: \"Online learning has become very common. Do you think online courses are as effective as traditional classroom courses? Why or why not?\"",
         model:"I think online courses can be just as effective as classroom courses, but only under certain conditions. The main advantage is flexibility: students can learn at their own pace and review recordings whenever they need to. However, online learning requires strong self-discipline, and it can reduce the spontaneous discussion that happens in a physical classroom. In my experience, a blended approach works best — online lectures for content delivery combined with in-person sessions for discussion and group work. This way, students benefit from both flexibility and meaningful interaction."},
        {id:"disc_group_grading",
 q:"Professor: \"In many courses, group projects receive a single shared grade for all members. Some students argue this is unfair because contributions are unequal. Should group projects be graded individually or as a team? Why?\"",
 model:"In my view, group projects should combine a shared team grade with an individual component. A purely shared grade does motivate cooperation, but it also allows weaker or less committed members to benefit from the work of others, which feels unfair and discourages the strongest contributors. Splitting the assessment solves this: most of the mark can reward the joint outcome, while a smaller part reflects each person's documented role and peer feedback. For example, in my statistics seminar we submitted a brief log of who did what, and the professor adjusted marks accordingly. This kept us collaborating while still holding everyone accountable for their own effort."},
{id:"disc_attendance_mandatory",
 q:"Professor: \"Some universities require students to attend lectures, while others leave attendance entirely optional. Do you think attendance should be mandatory at university? Why or why not?\"",
 model:"I believe attendance should generally remain optional at university, although there are important exceptions. Students are adults who are responsible for their own learning, and forcing them to sit in a lecture they could follow more efficiently from recordings often wastes time rather than improving understanding. Optional attendance also pushes lecturers to make sessions genuinely valuable. However, courses that depend on interaction, such as seminars, labs, or language classes, are different, because the learning happens through participation that cannot be replicated alone. For example, my microeconomics tutorial was only useful because we debated problems together. Therefore, I would make attendance compulsory only where collaboration is essential."},
{id:"disc_minimum_wage",
 q:"Professor: \"Economists disagree about minimum wage laws. Some argue they protect workers, while others claim they reduce employment. In your view, do the benefits of a minimum wage outweigh the costs?\"",
 model:"In my opinion, a moderate minimum wage usually does more good than harm, provided it is set carefully. Critics correctly note that if wages are forced far above what employers can afford, some low-skilled jobs may disappear. Yet a reasonable floor raises the income of the lowest-paid workers, reduces reliance on welfare, and can even boost consumer spending, which supports demand. The key is the level. For example, several economies have raised their minimum wage gradually without major job losses, because the increases stayed close to productivity growth. Overall, I think the benefits outweigh the costs as long as policymakers adjust the wage to local conditions rather than imposing a single aggressive rate."},
{id:"disc_smartphones_lectures",
 q:"Professor: \"Laptops and smartphones are increasingly used during lectures. Some instructors ban them, arguing they distract students. Should digital devices be allowed in the classroom? Defend your position.\"",
 model:"I think digital devices should be allowed in lectures rather than banned outright, even though distraction is a real concern. Laptops let students take searchable notes, look up unfamiliar terms immediately, and access course materials, all of which can deepen learning. A complete ban also treats adults as if they cannot manage their own attention. That said, the worry is legitimate, since one student scrolling social media can distract others nearby. A better solution is shared norms: the instructor explains expectations, and certain discussion segments become device-free. In my own experience, this approach worked well in a finance course, where laptops were welcome for note-taking but closed during group debate."},
{id:"disc_study_abroad",
 q:"Professor: \"Some students spend a semester studying abroad, while others believe the time is better spent at their home university. Is studying abroad worth the disruption and cost? Explain your reasoning.\"",
 model:"In my view, studying abroad is usually worth the disruption and cost, although it is not equally valuable for everyone. The obvious downsides are financial expense and the risk of falling behind in one's home programme. However, the experience offers benefits that are difficult to gain otherwise: exposure to different academic methods, improved language skills, and the independence that comes from managing life in an unfamiliar environment. These qualities matter especially in international fields such as management. For example, a friend who studied a semester in Singapore returned far more confident in working with people from other cultures. As long as the courses transfer properly, I believe the long-term gains justify the temporary inconvenience."},
{id:"disc_remote_work_productivity",
 q:"Professor: \"Since the pandemic, many companies allow employees to work remotely. Some managers worry that productivity suffers without an office. In your opinion, is remote work good for productivity? Why?\"",
 model:"I believe remote work can be good for productivity, but its success depends heavily on the type of job and the quality of management. Working from home removes commuting time and lets people concentrate without constant office interruptions, which often helps with focused, individual tasks. The concern about lower productivity is valid mainly when work requires close coordination or quick informal exchanges that are harder to replicate online. In my view, a hybrid model captures the advantages of both. For example, a consulting firm I read about kept analytical work remote but scheduled office days for brainstorming and client meetings. With clear goals and good communication tools, remote work supports rather than harms productivity."},
{id:"disc_open_access_research",
 q:"Professor: \"Much academic research is published in journals that charge high subscription fees. Some argue all publicly funded research should be freely available online. Do you support open access to research? Why or why not?\"",
 model:"I strongly support open access to publicly funded research, even though it raises questions about funding the publication process. When taxpayers finance a study, it seems fair that they, along with students and researchers worldwide, can read the results without paying expensive fees. Open access accelerates scientific progress, because findings spread faster and can be built upon more quickly, and it helps universities in poorer countries that cannot afford costly subscriptions. The main objection is that journals need revenue for editing and peer review, but this can be covered through publication charges or public funding instead. For example, several research councils now require open publication, and the wider sharing of knowledge clearly benefits society."},
{id:"disc_grades_vs_learning",
 q:"Professor: \"Students often focus on achieving high grades rather than on deep understanding of a subject. Do you think the current emphasis on grades helps or harms learning? Share your view.\"",
 model:"In my opinion, the heavy emphasis on grades tends to harm genuine learning, although grades are not useless. Marks provide a convenient signal to employers and a source of motivation, which is why they will not disappear. The problem is that when grades become the main goal, students often memorise material for exams and forget it soon afterwards, choosing easier courses simply to protect their average. This focus on short-term performance crowds out curiosity and deep understanding. For example, I have seen classmates avoid challenging electives they were genuinely interested in. I would therefore reduce the pressure by rewarding effort and improvement, so that students feel safe enough to learn rather than merely to score."}
      ],
    }

  grammar: [
    {title:"Tenses – Present Perfect vs. Past Simple",
     items:[
      {q:"I ___ in Mannheim since 2022.", options:["live","have lived","lived"], answer:1, explain:"„since“ + andauernd → Present Perfect."},
      {q:"She ___ her bachelor's degree last year.", options:["has finished","finished","finishes"], answer:1, explain:"Abgeschlossener Zeitpunkt „last year“ → Past Simple."},
      {q:"We ___ already ___ the report.", options:["did / submit","have / submitted","were / submitting"], answer:1, explain:"„already“ → Present Perfect: have submitted."}
     ]},
    {title:"Conditionals",
     items:[
      {q:"If I ___ more time, I would revise the essay.", options:["have","had","will have"], answer:1, explain:"Second Conditional: if + past, would + infinitive."},
      {q:"If the deadline ___, we will be in trouble.", options:["passes","passed","would pass"], answer:0, explain:"First Conditional: if + present, will + infinitive."}
     ]},
    {title:"Articles (a / an / the / –)",
     items:[
      {q:"She is ___ honest student.", options:["a","an","the"], answer:1, explain:"„honest“ beginnt mit Vokal-Laut (stummes h) → an."},
      {q:"___ University of Mannheim is well known.", options:["A","An","The"], answer:2, explain:"Eigenname mit „of“ → the."},
      {q:"I enjoy ___ economics.", options:["a","the","–"], answer:2, explain:"Schulfächer/Abstrakta meist ohne Artikel."}
     ]},
    {title:"Prepositions",
     items:[
      {q:"The results depend ___ several factors.", options:["of","on","from"], answer:1, explain:"depend on."},
      {q:"She is responsible ___ the budget.", options:["for","of","to"], answer:0, explain:"responsible for."},
      {q:"This is similar ___ the previous case.", options:["with","to","as"], answer:1, explain:"similar to."}
     ]},
    {title:"Word Formation",
     items:[
      {q:"Choose the noun: \"The ___ of the data took two days.\" (analyse)", options:["analysis","analytic","analysed"], answer:0, explain:"Nomen: analysis."},
      {q:"Choose the adjective: \"a very ___ argument\" (convince)", options:["convince","convincing","convincingly"], answer:1, explain:"Adjektiv: convincing."}
     ]},
    {title:"Passive Voice",
 items:[
  {q:"The questionnaires ___ to all first-year students last week.", options:["sent","were sent","have sent"], answer:1, explain:"Passiv im Past Simple: were + Past Participle (sent)."},
  {q:"A new library wing ___ on campus at the moment.", options:["is being built","is built","builds"], answer:0, explain:"Laufender Vorgang → Present Progressive Passiv: is being built."},
  {q:"The findings ___ widely before they were finally accepted.", options:["had been criticised","had criticised","were criticising"], answer:0, explain:"Vorzeitig + passiv → Past Perfect Passiv: had been criticised."}
 ]},
{title:"Relative Clauses",
 items:[
  {q:"The lecturer ___ supervises my thesis is on sabbatical.", options:["which","who","whose"], answer:1, explain:"Person als Subjekt → who."},
  {q:"Mannheim, ___ business school is highly ranked, attracts many applicants.", options:["which","whose","who"], answer:1, explain:"Besitz/Zugehörigkeit → whose (the school of Mannheim)."},
  {q:"The seminar ___ I attended yesterday was cancelled today.", options:["what","which","who"], answer:1, explain:"Sache als Objekt → which; „what“ ist hier falsch."}
 ]},
{title:"Reported Speech",

  {q:"He told me that he ___ the results already.", options:["has seen","had seen","sees"], answer:1, explain:"Present Perfect → Past Perfect beim Backshift: had seen."}
 ]},

/* ---------- Helfer ---------- */
const app=document.getElementById("app");
function el(html){const d=document.createElement("div");d.innerHTML=html.trim();return d.firstElementChild;}
function clear(){stopAudio();stopRecording();app.innerHTML="";window.scrollTo(0,0);}
function backBtn(){const b=el('<button class="back">← Zurück zur Übersicht</button>');b.onclick=dashboard;return b;}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
/* ---------- Rotation / No-Immediate-Repeat ---------- */
const RKEY="toefl_rotation_v1";
let rotation;try{rotation=JSON.parse(localStorage.getItem(RKEY)||"{}")||{};}catch(e){rotation={};}
if(!rotation||typeof rotation!=="object")rotation={};
const sessionSeen=new Set();                       // pro Sitzung gesehene Keys (modusuebergreifend), nicht persistent
function _itemKey(it){return (it&&(it.id||it.q||it.title))||it;}
function blockWindow(n){return Math.max(0,Math.min(n-1,Math.floor(n/2)));}
// Zieht 'count' Items aus einem Array, vermeidet zuletzt gesehene Keys (persistent) + diese Sitzung; merkt die Auswahl.
function pickItems(poolKey,items,count){
  if(!items||!items.length)return [];
  count=Math.min(count||1,items.length);
  const seen=rotation[poolKey]||[];
  const blocked=new Set(seen.slice(-blockWindow(items.length)));
  let avail=items.filter(it=>{const k=_itemKey(it);return !blocked.has(k)&&!sessionSeen.has(k);});
  if(avail.length<count)avail=items.filter(it=>!blocked.has(_itemKey(it)));
  if(avail.length<count)avail=items.slice();
  const chosen=shuffle(avail).slice(0,count);
  chosen.forEach(it=>sessionSeen.add(_itemKey(it)));
  rotation[poolKey]=[...seen,...chosen.map(_itemKey)].slice(-(items.length+count));
  try{localStorage.setItem(RKEY,JSON.stringify(rotation));}catch(e){}
  return chosen;
}
function pickItem(poolKey,items){return pickItems(poolKey,items,1)[0];}

/* Generisches Multiple-Choice-Quiz */
let quizCounter=0;
function buildQuiz(container,questions,onDone){
  const state={};const uid=++quizCounter;
  questions.forEach((qu,i)=>{
    const box=el(`<div class="q" role="radiogroup"><div class="qt">${qu.type?`<span class="pill">${qu.type}</span> `:""}${i+1}. ${qu.q}</div></div>`);
    box.setAttribute("aria-label",(qu.type?qu.type+": ":"")+(i+1)+". "+qu.q);
    qu.options.forEach((op,oi)=>{
      const o=el(`<label class="opt"><input type="radio" name="q${uid}_${i}">${op}</label>`);
      o.querySelector("input").onchange=()=>{state[i]=oi;box.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));o.classList.add("sel");};
      box.appendChild(o);
    });
    const ex=el(`<div class="expl">${qu.explain||""}</div>`);
    box.appendChild(ex);
    container.appendChild(box);
  });
  const btn=el('<button class="btn accent">Auswerten</button>');
  const res=el('<div></div>');
  btn.onclick=()=>{
    let correct=0;
    questions.forEach((qu,i)=>{
      const box=container.querySelectorAll(".q")[i];
      const opts=box.querySelectorAll(".opt");
      opts.forEach(o=>o.style.pointerEvents="none");
      opts[qu.answer].classList.add("correct");opts[qu.answer].appendChild(el('<span class="optmark ok">✓ richtig</span>'));
      if(state[i]===qu.answer){correct++;}
      else if(state[i]!=null){opts[state[i]].classList.add("wrong");opts[state[i]].appendChild(el('<span class="optmark no">✗ deine Antwort</span>'));}
      box.querySelector(".expl").classList.add("show");
    });
    const pct=Math.round(correct/questions.length*100);
    res.innerHTML="";
    res.appendChild(scoreBanner(correct,questions.length));
    btn.disabled=true;
    if(onDone)onDone(pct);
  };
  container.appendChild(btn);
  container.appendChild(res);
}
function scoreBanner(correct,total){
  const pct=Math.round(correct/total*100);
  const cls=pct>=80?"good":pct>=50?"mid":"low";
  return el(`<div class="result ${cls}">${correct} / ${total} richtig (${pct}%)</div>`);
}

let ttsVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  ttsVoice=vs.find(v=>/en[-_]US/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||null;
}
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=pickVoice;pickVoice();}
function speak(text,rate){
  if(!('speechSynthesis' in window)){alert("Dieser Browser unterstützt keine Sprachausgabe.");return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";u.rate=rate||0.95;if(ttsVoice)u.voice=ttsVoice;
  speechSynthesis.speak(u);
}

const AUDIO={
 cr1:"cr1.mp3",
