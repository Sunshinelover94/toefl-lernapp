<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f3a5f">
<title>TOEFL Lernapp – Mannheim Master in Management</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --navy:#1f3a5f; --navy2:#2c5282; --accent:#2a9d8f; --bg:#f4f6f9; --card:#ffffff;
  --txt:#1d2733; --muted:#5b6b7d; --line:#e2e8f0; --ok:#2e7d4f; --okbg:#e6f4ec;
  --bad:#c0392b; --badbg:#fbeae8; --warnbg:#fff6e5; --warn:#8a6d3b; --shadow:0 1px 3px rgba(0,0,0,.08),0 6px 18px rgba(0,0,0,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.55;-webkit-text-size-adjust:100%}
.wrap{max-width:760px;margin:0 auto;padding:0 16px 96px}
header.app{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:18px 16px;box-shadow:var(--shadow);position:sticky;top:0;z-index:20}
header.app .wrap{padding-bottom:0}
header.app h1{font-size:18px;margin:0 0 2px;font-weight:700;letter-spacing:.2px}
header.app p{margin:0;font-size:12.5px;opacity:.9}
.bar{height:8px;background:rgba(255,255,255,.25);border-radius:6px;margin-top:10px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .4s}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .05s,background .2s}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line)}
.btn.accent{background:var(--accent)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0;box-shadow:var(--shadow)}
.card h2{margin:0 0 6px;font-size:19px}
.card h3{margin:18px 0 6px;font-size:15.5px;color:var(--navy)}
.muted{color:var(--muted)}
.small{font-size:13px}
.pill{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:999px;background:#eef2f7;color:var(--navy2);margin-left:6px;vertical-align:middle}
.grid{display:grid;gap:12px;grid-template-columns:1fr}
@media(min-width:560px){.grid.two{grid-template-columns:1fr 1fr}}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);cursor:pointer;text-align:left;transition:transform .06s,border-color .2s}
.tile:hover{border-color:var(--navy2)}
.tile:active{transform:translateY(1px)}
.tile .t{font-weight:700;font-size:16px;margin-bottom:2px;color:var(--navy)}
.tile .d{font-size:13px;color:var(--muted)}
.tile .st{font-size:12px;margin-top:8px;font-weight:600}
.tile .st.done{color:var(--ok)}
.back{background:none;border:none;color:var(--navy);font-weight:600;font-size:14px;cursor:pointer;padding:14px 0 4px;display:inline-flex;gap:6px;align-items:center}
.q{margin:14px 0;padding:14px;border:1px solid var(--line);border-radius:12px;background:#fcfdff}
.q .qt{font-weight:600;margin-bottom:8px}
.opt{display:block;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;margin:7px 0;cursor:pointer;background:#fff;font-size:14.5px}
.opt:hover{border-color:var(--navy2)}
.opt.sel{border-color:var(--navy);background:#eef3fb}
.opt.correct{border-color:var(--ok);background:var(--okbg)}
.opt.wrong{border-color:var(--bad);background:var(--badbg)}
.opt input{margin-right:9px}
.expl{margin-top:8px;font-size:13.5px;padding:10px;border-radius:8px;background:var(--okbg);border:1px solid #cfe8d8;display:none}
.expl.show{display:block}
.result{font-weight:700;font-size:16px;padding:12px;border-radius:10px;margin-top:12px;text-align:center}
.result.good{background:var(--okbg);color:var(--ok)}
.result.mid{background:var(--warnbg);color:var(--warn)}
.result.low{background:var(--badbg);color:var(--bad)}
input[type=text],textarea{width:100%;font-family:inherit;font-size:15px;padding:10px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--txt)}
textarea{min-height:170px;resize:vertical;line-height:1.5}
.blank{display:inline-block;width:120px;margin:0 2px;padding:4px 6px;font-size:14px;border:1.5px solid var(--navy2);border-radius:7px}
.blank.ok{border-color:var(--ok);background:var(--okbg)}
.blank.no{border-color:var(--bad);background:var(--badbg)}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
.chip{display:inline-block;background:#eef3fb;border:1.5px solid var(--line);border-radius:9px;padding:7px 11px;font-size:14.5px;cursor:pointer;user-select:none}
.chip:hover{border-color:var(--navy2)}
.chip.used{opacity:.35;pointer-events:none}
.answerbox{min-height:46px;border:1.5px dashed var(--line);border-radius:10px;padding:8px;margin-top:8px;display:flex;flex-wrap:wrap;gap:7px;background:#fff}
.answerbox .chip{background:#fff;border-color:var(--navy2)}
.timer{font-variant-numeric:tabular-nums;font-weight:700;font-size:18px;color:var(--navy)}
.timer.warn{color:var(--bad)}
.flash{min-height:150px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:18px;border:1px solid var(--line);border-radius:14px;background:#fcfdff}
.flash .w{font-size:26px;font-weight:800;color:var(--navy)}
.flash .ex{font-size:14px;color:var(--muted);margin-top:8px;font-style:italic}
.flash .de{font-size:20px;font-weight:700;color:var(--accent);margin-top:14px;display:none}
.flash .de.show{display:block}
.counter{font-size:13px;color:var(--muted);text-align:center;margin-top:6px}
.note{font-size:12.5px;color:var(--muted);background:var(--warnbg);border:1px solid #f0e0bf;border-radius:9px;padding:9px 11px;margin:10px 0}
.audiobtn{font-size:15px}
.rubric{font-size:13.5px;background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:12px}
.rubric li{margin:3px 0}
.model{font-size:14px;background:var(--okbg);border:1px solid #cfe8d8;border-radius:10px;padding:12px;margin-top:10px;white-space:pre-wrap;display:none}
.model.show{display:block}
.check{display:flex;gap:9px;align-items:flex-start;font-size:14px;margin:6px 0}
.check input{margin-top:3px;width:18px;height:18px;flex:none}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.kpi .b{flex:1;min-width:120px;background:#f7f9fc;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.kpi .b .n{font-size:24px;font-weight:800;color:var(--navy)}
.kpi .b .l{font-size:12px;color:var(--muted)}
footer{text-align:center;font-size:12px;color:var(--muted);padding:24px 0}
.hidden{display:none!important}
.steps{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.steps button{flex:1;min-width:64px;font-size:12px;padding:8px 4px;border:1.5px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;color:var(--navy2);font-weight:600}
.steps button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.steps button.done{border-color:var(--ok);color:var(--ok)}
</style>
</head>
<body>
<header class="app">
  <div class="wrap">
    <h1>TOEFL iBT Lernapp <span class="pill">Format 2026</span></h1>
    <p>Ziel: ≥ 100 / 120 Punkte (C1) – Mannheim Master in Management</p>
    <div class="bar"><i id="globalbar"></i></div>
  </div>
</header>

<div class="wrap" id="app"></div>

<footer>

<script>
/* ============================================================

const CONTENT = {
  reading: {
    completeWords: {
      title: "Complete the Words",
      intro: "Ergänze die fehlenden Wörter. Der erste Buchstabe ist vorgegeben.",

      text: "Effective time {management} is essential for graduate students. By setting clear {priorities} and breaking large tasks into smaller steps, students can reduce {stress} and meet deadlines. A realistic {schedule} also helps to balance coursework with personal {responsibilities}.",

    dailyLife: {

        {q:"What happens after failing to cancel an unused booking twice?", options:["A fine must be paid","Booking rights are lost for one month","The room is closed","Nothing happens"], answer:1, explain:"„will lose booking rights for one month."},
        {q:"When does the library close on weekends?", options:["6:00 p.m.","8:00 p.m.","10:00 p.m.","It is closed"], answer:0, explain:"Weekends: 10:00 a.m. to 6:00 p.m."},
        {q:"Where can printing credit be added?", options:["Online","On the second floor","At the machine near the entrance","At the help desk"], answer:2, explain:"„at the machine near the entrance."}

    academic: {

      passage: "The Urban Heat Island Effect\n\n[1] Cities are typically several degrees warmer than the surrounding countryside, a phenomenon known as the urban heat island effect. Dark surfaces such as asphalt and rooftops absorb solar radiation during the day and release it slowly at night, keeping urban temperatures elevated. [2] The dense concentration of buildings also limits airflow, while waste heat from vehicles and air conditioning adds further warmth. [3] As a result, residents of large cities often experience hotter nights and higher energy demand for cooling. [4] Planners have proposed several remedies, including planting trees, installing reflective \"cool\" roofs, and creating green corridors that channel cooler air into the city center. Although no single measure eliminates the effect, a combination of strategies can meaningfully reduce peak temperatures.",
      questions: [
        {type:"Factual", q:"According to the passage, why do urban temperatures stay high at night?", options:["Trees release stored heat","Dark surfaces release absorbed radiation slowly","The countryside warms the city","Air conditioning cools the streets"], answer:1, explain:"Factual: dark surfaces „release it slowly at night."},
        {type:"Negative Factual", q:"All of the following are mentioned as causes EXCEPT:", options:["Waste heat from vehicles","Limited airflow between buildings","Heat from air conditioning","Increased rainfall over cities"], answer:3, explain:"Negative Factual: Niederschlag wird nicht genannt; die anderen drei schon."},
        {type:"Vocabulary", q:"The word \"remedies\" in the passage is closest in meaning to:", options:["solutions","dangers","measurements","delays"], answer:0, explain:"Vocabulary-in-Context: „remedies“ = Lösungen/Abhilfen."},
        {type:"Inference", q:"It can be inferred that a single measure alone:", options:["fully solves the problem","is illegal in most cities","is not sufficient on its own","increases temperatures"], answer:2, explain:"Inference: „no single measure eliminates the effect“ → eines allein reicht nicht."},
        {type:"Sentence Insertion", q:"Where would this sentence best fit? → \"This trapped heat is one reason the effect is strongest after sunset.\"", options:["After [1]","After [2]","After [3]","After [4]"], answer:0, explain:"Sentence Insertion: bezieht sich auf das langsame Abgeben der Wärme aus [1]."},
        {type:"Prose Summary", q:"Which sentence best states the main idea?", options:["Cities should ban all vehicles.","Urban areas are warmer than rural ones, and combined strategies can reduce the effect.","Trees are the only solution to heat.","Air conditioning cools entire cities."], answer:1, explain:"Prose Summary: Hauptaussage = Städte sind wärmer; kombinierte Maßnahmen helfen."}
      ]
    }
  },

  listening: {
    chooseResponse: {
      title: "Listen and Choose a Response",
      intro: "Höre die Äußerung und wähle die passendste Antwort.",
      items: [
        {audio:"Excuse me, do you know where the lecture on macroeconomics is being held?", options:["Yes, it's in Room B6, just down the hall.","I studied economics last year.","The lecture was very interesting."], answer:0, explain:"Auf eine Wegfrage passt die Ortsangabe."},
        {audio:"I'm afraid I won't be able to finish the group report by Friday.", options:["Congratulations on finishing early!","No problem, let's ask for an extension together.","I don't have a report."], answer:1, explain:"Reaktion auf ein Problem: gemeinsame Lösung anbieten."},
        {audio:"Would you mind if I joined your study group this week?", options:["Not at all, you're welcome to join us.","I minded the gap.","The group is on the third floor yesterday."], answer:0, explain:"„Would you mind…“ → höfliche Zustimmung."}
      ]
    },
    conversation: {
      title: "Listen to a Conversation",
      intro: "Ein Gespräch zwischen einer Studentin und einem Mitarbeiter des Prüfungsamts.",
      script: "Student: Hi, I wanted to ask about registering for the management exam next semester. Staff: Sure. Registration opens on the first of November and closes two weeks later. Student: Do I need to register for each course separately? Staff: Yes, every exam has its own registration. And remember, if you register but don't show up, it counts as a failed attempt. Student: Oh, that's important to know. Can I deregister if I change my mind? Staff: You can, up to one week before the exam date, online.",

        {q:"What happens if a student registers but does not attend?", options:["Nothing","It counts as a failed attempt","They get a refund","They must re-register"], answer:1, explain:"„it counts as a failed attempt."},
        {q:"Until when can a student deregister?", options:["One week before the exam","On the exam day","Two weeks after the exam","Never"], answer:0, explain:"„up to one week before the exam date."}
      ]
    },
    announcement: {
      title: "Listen to an Announcement",
      intro: "Eine Durchsage auf dem Campus.",
      script: "Attention, please. Due to scheduled maintenance, the main elevator in the business school building will be out of service this Thursday from 9 a.m. to 2 p.m. Please use the elevators in the east wing or the staircases. Lectures on the upper floors will take place as usual. We apologize for any inconvenience.",
      questions: [
        {q:"Why is the elevator out of service?", options:["A power outage","Scheduled maintenance","An accident","A fire drill"], answer:1, explain:"„Due to scheduled maintenance."},
        {q:"What are people advised to do?", options:["Stay home","Use the east-wing elevators or stairs","Cancel their lectures","Wait until 2 p.m. only"], answer:1, explain:"„use the elevators in the east wing or the staircases."}

      questions: [
        {q:"What is the main topic of the talk?", options:["How to build a factory","The concept of opportunity cost","Investing in bonds","Time management"], answer:1, explain:"Thema: opportunity cost."},
        {q:"According to the speaker, opportunity cost is:", options:["always measured in money","the value of the next best alternative given up","the total cost of a project","a type of tax"], answer:1, explain:"Definition wörtlich genannt."},

  speaking: {

    interview: {
      title: "Take an Interview",
      intro: "Beantworte die Interviewfragen mündlich. Nimm dich auf, höre dir die Antwort an und bewerte dich mit der Checkliste. Eine Musterantwort findest du darunter.",
      prompts: [
        {q:"Tell me about a subject you enjoyed studying and why.",
         model:"One subject I really enjoyed was statistics. At first it seemed quite abstract, but I gradually realised how useful it is for making decisions based on real data. I liked that every problem had a clear, logical solution, and I found it satisfying to interpret results and explain them to others."},
        {q:"What do you think are the advantages of studying abroad?",
         model:"Studying abroad has several advantages. First, you improve your language skills much faster because you use the language every day. Second, you experience a different academic culture, which broadens your perspective. Finally, living independently in a new country builds confidence and makes you more adaptable."},
        {q:"Describe a goal you would like to achieve in the next few years.",

        {q:"Do you prefer working in a team or working alone? Why?",
         model:"It depends on the task, but generally I prefer working in a team. Different people bring different ideas, and discussing problems usually leads to better solutions. That said, for tasks that require deep concentration, such as writing or detailed analysis, I find that working alone is more efficient."}
      ],
      checklist: ["Habe ich klar und ohne lange Pausen gesprochen?","Habe ich die Frage direkt beantwortet?","Habe ich ein Beispiel oder einen Grund genannt?","War die Aussprache verständlich?","Habe ich Verbindungswörter benutzt (first, because, however)?"]
    }

  writing: {
    buildSentence: {
      title: "Build a Sentence",
      intro: "Klicke die Wörter in die richtige Reihenfolge.",
      items: [

        "She has been studying management for two years.",

      intro: "Schreibe eine kurze, angemessene E-Mail (ca. 7 Minuten). Ziel: ~80–120 Wörter, klare Struktur, höflicher Ton.",

        {q:"You missed an important lecture because you were ill. Write an email to your professor: apologise, explain briefly, and ask what you can do to catch up.",
         model:"Dear Professor Müller,\n\nI am writing to apologise for missing yesterday's lecture on strategic management. Unfortunately, I was unwell and unable to attend. I would be very grateful if you could let me know whether the slides are available online and what topics I should review. If there is any additional material or a task I missed, I am happy to complete it. Thank you very much for your understanding.\n\nKind regards,\nMaria Schmidt"},
        {q:"Your study group needs to reschedule a meeting. Write an email to the other members: explain why, suggest a new time, and ask for confirmation.",
         model:"Hi everyone,\n\nI hope you are all doing well. Unfortunately, I have a conflict with our meeting on Wednesday afternoon. Would it be possible to move it to Thursday at 4 p.m. in the library instead? That time should still give us enough time to finish the presentation before the deadline. Please let me know if this works for you, or suggest another time if it does not. Thanks a lot, and see you soon!\n\nBest,\nJonas"}
      ]
    },
    discussion: {
      title: "Write for an Academic Discussion",
      intro: "Reagiere wie in einem Online-Diskussionsforum (ca. 10 Minuten). Ziel: ≥ 100 Wörter, eigene Meinung + Begründung + Beispiel, Bezug auf die Frage.",

      ],

  vocab: [
    ["analyse","analysieren","We need to analyse the results carefully."],
    ["approach","Ansatz / sich nähern","Her approach to the problem was very systematic."],

/* Generisches Multiple-Choice-Quiz */
function buildQuiz(container,questions,onDone){
  const state={};
  questions.forEach((qu,i)=>{
    const box=el(`<div class="q"><div class="qt">${qu.type?`<span class="pill">${qu.type}</span> `:""}${i+1}. ${qu.q}</div></div>`);
    qu.options.forEach((op,oi)=>{
      const o=el(`<label class="opt"><input type="radio" name="q${i}">${op}</label>`);
      o.querySelector("input").onchange=()=>{state[i]=oi;box.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));o.classList.add("sel");};
      box.appendChild(o);
    });
    const ex=el(`<div class="expl">${qu.explain||""}</div>`);
    box.appendChild(ex);
    container.appendChild(box);
  });
  const btn=el('<button class="btn accent">Auswerten</button>');
  const res=el('<div></div>');
  btn.onclick=()=>{
    let correct=0;
    questions.forEach((qu,i)=>{
      const box=container.querySelectorAll(".q")[i];
      const opts=box.querySelectorAll(".opt");
      opts.forEach(o=>o.style.pointerEvents="none");
      if(state[i]===qu.answer){opts[qu.answer].classList.add("correct");correct++;}
      else{opts[qu.answer].classList.add("correct");if(state[i]!=null)opts[state[i]].classList.add("wrong");}
      box.querySelector(".expl").classList.add("show");
    });
    const pct=Math.round(correct/questions.length*100);
    res.innerHTML="";
    res.appendChild(scoreBanner(correct,questions.length));
    btn.disabled=true;
    if(onDone)onDone(pct);
  };
  container.appendChild(btn);
  container.appendChild(res);
}
function scoreBanner(correct,total){
  const pct=Math.round(correct/total*100);
  const cls=pct>=80?"good":pct>=50?"mid":"low";
  return el(`<div class="result ${cls}">${correct} / ${total} richtig (${pct}%)</div>`);
}

/* ---------- Text-to-Speech ---------- */
let ttsVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  ttsVoice=vs.find(v=>/en[-_]US/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||null;
}
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=pickVoice;pickVoice();}
function speak(text,rate){
  if(!('speechSynthesis' in window)){alert("Dieser Browser unterstützt keine Sprachausgabe.");return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";u.rate=rate||0.95;if(ttsVoice)u.voice=ttsVoice;
  speechSynthesis.speak(u);
}

const AUDIO_BASE="audio/";
const AUDIO={
 cr1:"cr1.mp3",

 conv1:"conv1.mp3",
 conv2:"conv2.mp3",

};
let currentAudio=null;
function stopAudio(){try{if(currentAudio){currentAudio.pause();currentAudio.src="";currentAudio=null;}}catch(e){}if('speechSynthesis'in window)speechSynthesis.cancel();}
// Spielt eine Liste von MP3-Dateinamen nacheinander ab (z. B. Gespräch mit 2 Sprechern); bei Fehler -> Browser-Stimme.
function playAudio(files,fallbackText,rate){
  stopAudio();
  if(!files||!files.length||!files[0]){speak(fallbackText,rate);return;}
  let i=0;
  const next=()=>{
    if(i>=files.length){currentAudio=null;return;}
    const a=new Audio(AUDIO_BASE+files[i]);currentAudio=a;
    a.onended=()=>{i++;next();};
    a.onerror=()=>{currentAudio=null;speak(fallbackText,rate);};
    a.play().catch(()=>{currentAudio=null;speak(fallbackText,rate);});
  };
  next();
}
function audioButton(text,label,files){
  const b=el(`<button class="btn ghost audiobtn">▶ ${label||"Abspielen"}</button>`);
  b.onclick=()=>playAudio(files,text);
  return b;
}

// Listen-and-Repeat: aufnehmen + (optional) Spracherkennung & Abgleich
function doRepeat(target,fb,btn,cb){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    const rec=new SR();rec.lang="en-US";rec.interimResults=false;rec.maxAlternatives=1;
    fb.innerHTML='🎙️ <b>Sprich jetzt…</b>';btn.disabled=true;
    rec.onresult=(e)=>{
      const said=e.results[0][0].transcript;
      const score=similarity(target,said);
      const cls=score>=80?"good":score>=50?"mid":"low";
      fb.innerHTML=`<div class="result ${cls}" style="margin-top:6px">Erkannt: „${said}"<br>Übereinstimmung: ${score}%</div>`;
      btn.disabled=false;cb&&cb(score);
    };
    rec.onerror=(e)=>{fb.innerHTML=`<span class="muted">Spracherkennung nicht möglich (${e.error}). Du kannst stattdessen aufnehmen und selbst vergleichen.</span>`;btn.disabled=false;fallbackRecord();};
    rec.onend=()=>{btn.disabled=false;};
    try{rec.start();}catch(err){fallbackRecord();}
  }else{fallbackRecord();}
  function fallbackRecord(){doRecordPlayback(fb,btn);}
}
// Reine Audioaufnahme + Wiedergabe
function doRecordPlayback(container,btn){
  if(!micSupported()){container.innerHTML='<span class="muted">Kein Mikrofon verfügbar – bitte über HTTPS/localhost öffnen.</span>';return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const mr=new MediaRecorder(stream);const chunks=[];
    mr.ondataavailable=e=>chunks.push(e.data);
    mr.onstop=()=>{
      const blob=new Blob(chunks,{type:'audio/webm'});const url=URL.createObjectURL(blob);
      const audio=el(`<audio controls src="${url}" style="width:100%;margin-top:8px"></audio>`);
      container.innerHTML="";container.appendChild(audio);
      stream.getTracks().forEach(t=>t.stop());
    };
    mr.start();btn.disabled=true;const old=btn.textContent;btn.textContent="■ Stop";
    btn.onclick=()=>{mr.stop();btn.disabled=false;btn.textContent=old;};
    container.innerHTML='<span class="muted">🎙️ Aufnahme läuft… auf „Stop" drücken.</span>';
  }).catch(err=>{container.innerHTML=`<span class="muted">Mikrofon-Zugriff verweigert (${err.name}).</span>`;});
}
// einfache Wort-Übereinstimmung
function similarity(a,b){
  const norm=s=>s.toLowerCase().replace(/[^a-z\s']/g," ").split(/\s+/).filter(Boolean);
  const A=norm(a),B=new Set(norm(b));let hit=0;A.forEach(w=>{if(B.has(w))hit++;});
  return Math.round(hit/Math.max(A.length,1)*100);
}

function writingTask(task){
  const card=el(`<div class="card"><h2>${task.title}</h2><p class="muted small">${task.intro}</p></div>`);
  const pr=task.prompts[Math.floor(Math.random()*task.prompts.length)];

  const ta=el('<textarea placeholder="Hier schreiben…"></textarea>');
  const meta=el('<div class="row" style="justify-content:space-between"></div>');
  const cnt=el('<span class="counter" style="margin:0">0 Wörter</span>');
  const timer=el(`<span class="timer">${fmt(task.timer)}</span>`);
  const start=el('<button class="btn ghost sm">⏱ Timer starten</button>');

function viewMock(){
  clear();app.appendChild(backBtn());
  app.appendChild(el('<div class="card"><h2>🏁 Mini-Mock-Test</h2><p class="muted small">Kurzform: je eine Aufgabe pro objektivem Bereich. Am Ende erhältst du eine grobe Punkt-<b>Schätzung</b> (keine offizielle Bewertung).</p></div>'));
  let total=0,correct=0,scored=0;const need=3;
  const result=el('<div class="card hidden"></div>');

  // Reading (academic, 4 Fragen)
  const rc=el(`<div class="card"><h3 style="margin-top:0">📖 Reading</h3><pre style="white-space:pre-wrap;font-family:inherit;font-size:14px;background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:12px">${CONTENT.reading.academic.passage}</pre></div>`);
  const rq=CONTENT.reading.academic.questions.slice(0,4);
  buildQuiz(rc,rq,(pct)=>{total+=rq.length;correct+=Math.round(pct/100*rq.length);tally();});
  app.appendChild(rc);

  // Listening (talk)
  const lc=el(`<div class="card"><h3 style="margin-top:0">🎧 Listening</h3></div>`);
  lc.appendChild(audioButton(CONTENT.listening.talk.script,"Anhören"));
  buildQuiz(lc,CONTENT.listening.talk.questions,(pct)=>{total+=CONTENT.listening.talk.questions.length;correct+=Math.round(pct/100*CONTENT.listening.talk.questions.length);tally();});
  app.appendChild(lc);

  // Writing (build a sentence x3)
  const wc=el('<div class="card"><h3 style="margin-top:0">✍️ Writing – Build a Sentence</h3></div>');
  const sents=shuffle(CONTENT.writing.buildSentence.items).slice(0,3);
  let wDone=0,wOk=0;
  sents.forEach((sentence,i)=>{
    const words=sentence.replace(/\.$/,"").split(" ");
    const box=el(`<div class="q"><div class="qt">Satz ${i+1}</div></div>`);
    const answer=el('<div class="answerbox"></div>');const pool=el('<div class="row"></div>');const order=[];
    shuffle(words).forEach(wd=>{const chip=el(`<span class="chip">${wd}</span>`);chip.onclick=()=>{order.push(wd);chip.classList.add("used");const a=el(`<span class="chip">${wd}</span>`);a.onclick=()=>{const idx=order.lastIndexOf(wd);if(idx>-1)order.splice(idx,1);a.remove();chip.classList.remove("used");};answer.appendChild(a);};pool.appendChild(chip);});
    const chk=el('<button class="btn accent sm" style="margin-top:10px">Prüfen</button>');const res=el('<div></div>');
    chk.onclick=()=>{const ok=order.join(" ")===words.join(" ");res.innerHTML=`<div class="result ${ok?'good':'low'}">${ok?'✓ Richtig!':'✗ '+sentence}</div>`;wOk+=ok?1:0;wDone++;chk.disabled=true;if(wDone===sents.length){total+=sents.length;correct+=wOk;tally();}};
    box.appendChild(answer);box.appendChild(pool);box.appendChild(chk);box.appendChild(res);wc.appendChild(box);
  });
  app.appendChild(wc);
  app.appendChild(result);

  function tally(){scored++;if(scored>=need)showResult();}
  function showResult(){
    const pct=Math.round(correct/total*100);
    const est=Math.round(pct/100*120);
    let band,cefr;
    if(est>=110){band="5.5–6";cefr="C1/C2";}
    else if(est>=100){band="5";cefr="C1";}
    else if(est>=90){band="4.5";cefr="B2+/C1";}
    else if(est>=72){band="4";cefr="B2";}
    else if(est>=60){band="3.5";cefr="B1+/B2";}
    else{band="≤3";cefr="≤B1";}
    const reach=est>=100;
    result.innerHTML=`<h2>Dein Ergebnis (Schätzung)</h2>
      <div class="kpi">
        <div class="b"><div class="n">${est}</div><div class="l">geschätzt /120</div></div>
        <div class="b"><div class="n">${band}</div><div class="l">Band (1–6)</div></div>
        <div class="b"><div class="n">${cefr}</div><div class="l">CEFR</div></div>
      </div>
      <div class="result ${reach?'good':'mid'}" style="margin-top:14px">${reach?'🎯 Auf Kurs zum Mannheim-Ziel (≥100/C1)!':'Noch unter dem Mannheim-Ziel von 100/120 – dranbleiben!'}</div>
      <p class="muted small" style="margin-top:10px">Hinweis: nur objektive Aufgaben (Reading, Listening, Build-a-Sentence) fließen ein. Speaking und die freien Writing-Aufgaben werden im echten Test separat bewertet – übe sie in den jeweiligen Modulen mit Musterlösung & Checkliste.</p>`;
    result.classList.remove("hidden");
    setBest("reading",Math.max(progress["reading"]||0,pct)); // grober Beitrag
    result.scrollIntoView({behavior:"smooth"});
  }
  app.appendChild(backBtn());
}

let examUid=0, examInterval=null, examLeft=0;

function examMCQ(container,questions){
  examUid++; const uid=examUid, sel={};
  questions.forEach((qu,i)=>{
    const box=el(`<div class="q"><div class="qt">${i+1}. ${qu.q}</div></div>`);
    qu.options.forEach((op,oi)=>{
      const o=el(`<label class="opt"><input type="radio" name="ex${uid}_${i}">${op}</label>`);
      o.querySelector("input").onchange=()=>{sel[i]=oi;box.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));o.classList.add("sel");};
      box.appendChild(o);
    });
    container.appendChild(box);
  });
  return ()=>questions.reduce((n,qu,i)=>n+(sel[i]===qu.answer?1:0),0);
}

    <div class="kpi">
      <div class="b"><div class="n">${r}</div><div class="l">Reading<br>(${examState.rPath} Block)</div></div>
      <div class="b"><div class="n">${l}</div><div class="l">Listening<br>(${examState.lPath} Block)</div></div>
      <div class="b"><div class="n">${w}</div><div class="l">Writing</div></div>
      <div class="b"><div class="n">${s}</div><div class="l">Speaking</div></div>
    </div>
    <p class="muted small" style="margin-top:12px">Reading & Listening wurden <b>nach Blockschwierigkeit gewichtet</b>: Wer in den schweren Block geroutet wurde und ihn meistert, erreicht den höchsten Score; der leichte Pfad ist – wie im echten adaptiven Test – nach oben gedeckelt. Writing/Speaking beruhen auf deiner Selbsteinschätzung und sind als Orientierung zu verstehen, keine offizielle Bewertung.</p>
  </div>`));
  const again=el('<button class="btn">Nochmal simulieren</button>');again.onclick=viewExam;
  app.appendChild(again);app.appendChild(backBtn());
}

/* ---------- Service Worker registrieren (PWA) ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}

/* ---------- Start ---------- */
dashboard();
</script>
